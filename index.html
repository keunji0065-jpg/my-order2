                });
            }, [openModal]);

            const handleExportBackup = () => downloadExcel([{ orders, productHistory, shippingOverrides, cardPayments, matchedDeposits: [...matchedDeposits], clickedChats: [...clickedChats], addressMapping, specialCustomers, inventory, templateConfig, depositorNames, keywords: [...keywords] }], "kallo_backup");
            
            const handleImportBackup = (e) => { 
                const f = e.target.files[0]; 
                if(!f) return; 
                const r = new FileReader(); 
                r.onload = (evt) => { 
                    try { 
                        const d = JSON.parse(evt.target.result); 
                        if(d[0] && d[0].orders) { 
                            setOrders(d[0].orders || []); 
                            if(d[0].addresses) setAddresses(d[0].addresses); 
                            if(d[0].inventory) setInventory(d[0].inventory); 
                            if(d[0].templateConfig) setTemplateConfig(()=>d[0].templateConfig); 
                        } else if (d.orders) { 
                            setOrders(d.orders || []); 
                            if(d.addresses) setAddresses(d.addresses); 
                            if(d.inventory) setInventory(d.inventory); 
                            if(d.templateConfig) setTemplateConfig(()=>d.templateConfig); 
                        }
                        openModal("복구 완료", "alert"); 
                    } catch(err) { openModal("파일 오류", "alert"); } 
                }; 
                r.readAsText(f); 
                e.target.value = ''; 
            };

            const hasP = useRef(false);
            useEffect(() => {
                if (hasP.current) return; hasP.current = true;
                if (orders.length === 0 && googleScriptUrl) {
                    setTimeout(() => { 
                        openModal("🚨 주문 내역을 클라우드에서 복구하시겠습니까?", 'confirm', async () => { 
                            try { 
                                const actualSheetId = getCleanSheetId(customerSheetId); 
                                const res = await fetch(`${googleScriptUrl}?action=get_orders&t=${Date.now()}&sheet_id=${actualSheetId}`); 
                                const text = await res.text();
                                if (text.trim().startsWith("<!DOCTYPE")) { setTimeout(() => openModal(`서버 거부: 스크립 권한을 확인해주세요.`, 'alert'), 300); return; }
                                const data = JSON.parse(text); 
                                let fs = data.orders || data.data || data; 
                                if (fs && fs.length > 0) { 
                                    if (Array.isArray(fs[0])) { 
                                        const h = fs[0]; 
                                        fs = fs.slice(1).map(r => { const o = {}; h.forEach((k, i) => o[k] = r[i]); return o; }); 
                                    } 
                                    const loadedOrders = fs.map((o, idx) => mapCloudOrderToLocal(o, idx)).filter(o => o.customer || o.product);

                    {isSettingsOpen && (

                                        <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">미납 안내</label><textarea value={templateConfig.unpaidPrefix} onChange={(e)=>{const v = e.target.value; setTemplateConfig(p => ({...p, unpaidPrefix: v}));}} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-16 resize-none bg-slate-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-1 focus:ring-slate-400" /></div>
                                        <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">계좌번호</label><textarea value={bankAccount} onChange={(e)=>{const v = e.target.value; setBankAccount(() => v);}} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-12 resize-none bg-slate-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-1 focus:ring-slate-400" /></div>
                                        <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">주소 있음 안내</label><textarea value={templateConfig.addrNotice} onChange={(e)=>{const v = e.target.value; setTemplateConfig(p => ({...p, addrNotice: v}));}} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-12 resize-none bg-slate-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-1 focus:ring-slate-400" /></div>
                                        <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">주소 없음 안내</label><textarea value={templateConfig.surveyNotice} onChange={(e)=>{const v = e.target.value; setTemplateConfig(p => ({...p, surveyNotice: v}));}} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-24 resize-none bg-slate-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-1 focus:ring-slate-400" /></div>
                                        <div className="flex items-center justify-between bg-slate-100 dark:bg-slate-800 p-2 rounded border border-slate-300 dark:border-slate-600">
                                            <label className="text-xs font-bold text-slate-700 dark:text-slate-300 cursor-pointer" onClick={() => setTemplateConfig(p => ({...p, alwaysRequestAddress: !p.alwaysRequestAddress}))}>주소록 무시하고 항상 새로 입력받기</label>
                                            <input type="checkbox" checked={templateConfig.alwaysRequestAddress || false} onChange={(e)=>{const v = e.target.checked; setTemplateConfig(p => ({...p, alwaysRequestAddress: v}));}} className="custom-checkbox" />
                                        </div>
                                    </div>
                                </div>
                                <div className="border-t dark:border-slate-700 pt-4"><h4 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-2 flex items-center gap-1"><Icon name="lightning" weight="fill" className="text-slate-500"/> 빠른 댓글 설정</h4>
                                    <div className="space-y-2">
                                        {quickMessages.map((msg, idx) => (
                                            <input 
                                                key={idx}
                                                type="text" 
                                                value={msg} 
                                                onChange={(e) => {
                                                    const v = e.target.value;
                                                    setQuickMessages(prev => {
                                                        const next = [...prev];
                                                        next[idx] = v;
                                                        return next;
                                                    });
                                                }}
                                                className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs bg-slate-50 dark:bg-slate-900 dark:text-white outline-none focus:ring-1 focus:ring-slate-400" 
                                            />
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <button onClick={()=>setIsSettingsOpen(false)} className="w-full bg-slate-800 text-white rounded py-2 text-sm font-bold hover:bg-slate-900 dark:bg-slate-700 dark:hover:bg-slate-600 transition-colors shadow-sm">닫기</button>
                        </div>
                    )}
                    <main className="flex-1 overflow-hidden bg-slate-200 dark:bg-slate-950 p-2 relative">
                        {activeTab === 'live' && <LiveTab {...{ orders, setOrders, productHistory, setProductHistory, quickShipping, shippingOverrides, setShippingOverrides, bankAccount, googleScriptUrl, addressScriptUrl, inventoryScriptUrl, addresses, setAddresses, cardPayments, setCardPayments, matchedDeposits, setMatchedDeposits, depositorNames, setDepositorNames, clickedChats, setClickedChats, openModal, keywords, setKeywords, sentAddressRequests, setSentAddressRequests, deletedDepositIds, setDeletedDepositIds, checkedOrders, setCheckedOrders, addressMapping, setAddressMapping, templateConfig, specialCustomers, setSpecialCustomers, inventory, setInventory, quickMessages, customerSheetId, handleResetAllData }} />}
                        {activeTab === 'manage' && <OrderManagementTab {...{ orders, shippingOverrides, quickShipping, addresses, handleExportBackup, handleImportBackup, addressMapping, cardPayments, specialCustomers, openModal }} />}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
