<!DOCTYPE html>
<html lang="ko" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>깔로 주문서 PRO (정식 버전)</title>
    
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js" crossorigin="anonymous"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/@phosphor-icons/web" crossorigin="anonymous"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
    <script src="//t1.daumcdn.net/mapjsapi/bundle/postcode/prod/postcode.v2.js"></script>
    
    <script>
        tailwind.config = { 
            darkMode: 'class', 
            theme: { 
                extend: { 
                    fontFamily: { sans: ['NanumSquareNeo', 'Pretendard', 'sans-serif'] }, 
                    colors: { brand: { 50: '#f0f4f8', 500: '#627d98', 600: '#486581', 700: '#334e68' }, kakao: '#FEE500' } 
                } 
            } 
        }
    </script>
    <style>
        @import url("https://cdn.jsdelivr.net/gh/moonspam/NanumSquareNeo/nanumsquareneo.css");
        body { font-family: 'NanumSquareNeo', sans-serif; background-color: #f8fafc; transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #0f172a; color: #f1f5f9; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .processed-chat { text-decoration: line-through; background-color: #f1f5f9 !important; color: #94a3b8 !important; opacity: 0.6; }
        .dark .processed-chat { background-color: #1e293b !important; color: #64748b !important; }
        .selected-chat-active { border-left: 3px solid #3b82f6; background-color: #eff6ff; }
        .dark .selected-chat-active { border-left-color: #60a5fa; background-color: #1e293b; }
        .keyword-detected { border: 2px solid #60a5fa; background-color: #eff6ff; }
        .dark .keyword-detected { border-color: #3b82f6; background-color: #1e293b; }
        .copy-anim { animation: copySuccess 0.3s ease-in-out; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        @keyframes copySuccess { 0% { transform: scale(1); } 50% { transform: scale(1.1); } 100% { transform: scale(1); } }
        .custom-checkbox { appearance: none; background-color: #fff; margin: 0; font: inherit; color: currentColor; width: 1.4em; height: 1.4em; border: 2px solid #cbd5e1; border-radius: 4px; display: grid; place-content: center; cursor: pointer; transition: all 0.2s; }
        .dark .custom-checkbox { background-color: #1e293b; border-color: #475569; }
        .custom-checkbox::before { content: ""; width: 0.8em; height: 0.8em; transform: scale(0); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; background-color: white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        .custom-checkbox:checked { background-color: #3b82f6; border-color: #3b82f6; }
        .custom-checkbox:checked::before { transform: scale(1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, memo } = React;

        const DEFAULT_GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzWZ-hfeUalSPThiMW5-RWDHTDdiBzBtCUy9-1gOaRN6gTD1lsxKzS6in8N_2w-xnJ3zg/exec";
        const FIXED_BANK_ACCOUNT = "카카오뱅크 김선정\n7942 18 01611";
        const DEFAULT_CUSTOMER_SHEET_ID = "1zlL6R8iCy-6ZRMqj6dbefhkwSyRzHibDYBNJLmE35bM";
        
        const Icon = ({ name, className="", weight="regular", size }) => <i className={`ph ph-${name} ${className}`} data-phosphor-icon-weight={weight} style={{fontSize: size}}></i>;
        const normalizeString = (str) => String(str || '').replace(/[\s\(\)\[\]\{\}\-\_\.\,\/]/g, '').toLowerCase();

        const getChosung = (str) => {
            if (!str) return '';
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅇ","ㅆ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let result = "";
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        };

        const cleanForMatch = (str) => {
            if (!str) return '';
            let s = String(str).toLowerCase().replace(/\s/g, '');
            s = s.replace(/[—–−_]/g, '-');
            if (s.includes('-')) s = s.split('-')[0];
            s = s.replace(/[\(\)\[\]\{\}\.\,\/]/g, '');
            if (/[가-힣]/.test(s)) s = s.replace(/[a-z0-9]+$/, '');
            return s;
        };

        const getCleanSheetId = (idOrUrl) => {
            if (!idOrUrl) return '';
            const match = idOrUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : idOrUrl.trim();
        };

        const generateChatId = (chat) => {
            const safeNick = String(chat.nickname || '').replace(/\s/g, '');
            const safeContent = String(chat.content || '').replace(/\s/g, '').substring(0, 20);
            const safeTime = String(chat.time || '').replace(/[^0-9]/g, ''); 
            return `chat_${safeTime}_${safeNick}_${safeContent}`;
        };

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    if (!item) return initialValue;
                    const parsed = JSON.parse(item);
                    if (key === 'productInventory' && !Array.isArray(parsed)) {
                        return Object.entries(parsed).map(([name, info]) => ({
                            id: `inv_${Date.now()}_${Math.random()}`,
                            name,
                            stock: info.stock || 0,
                            price: info.price || 0
                        }));
                    }
                    return parsed;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const timer = setTimeout(() => {
                    try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch(e) {}
                }, 1000);
                return () => clearTimeout(timer);
            }, [key, storedValue]);

            const setValue = useCallback((value) => {
                try { setStoredValue(prev => value instanceof Function ? value(prev) : value); } catch (error) {}
            }, []);

            return [storedValue, setValue];
        };

        const downloadExcel = (data, fileName) => {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, `${fileName}_${new Date().toLocaleDateString()}.xlsx`);
        };

        const Modal = ({ isOpen, type, message, onConfirm, onCancel, initialValue }) => {
            const [inputValue, setInputValue] = useState(initialValue || '');
            const inputRef = useRef(null);
            
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!isOpen) return;
                    if (type !== 'confirm' && type !== 'alert') { 
                        if (e.key === 'Enter') onConfirm(inputValue);
                    } else {
                        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onConfirm(); }
                    }
                    if (e.key === 'Escape' && type !== 'alert') onCancel();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isOpen, type, inputValue, onConfirm, onCancel]);
            
            useEffect(() => { if (isOpen && type === 'prompt' && inputRef.current) { setInputValue(initialValue || ''); setTimeout(() => inputRef.current.focus(), 100); } }, [isOpen, type, initialValue]);
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] animate-pop" onClick={type === 'alert' ? () => onConfirm() : undefined}>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-80 max-w-sm" onClick={e => e.stopPropagation()}>
                        <div className="mb-4">
                            <h3 className="text-lg font-bold text-center text-gray-800 dark:text-slate-100 mb-2">{type === 'confirm' ? '확인' : type === 'prompt' ? '입력' : '알림'}</h3>
                            <p className="text-sm text-gray-600 dark:text-slate-400 text-center whitespace-pre-wrap leading-relaxed">{message}</p>
                        </div>
                        {type === 'prompt' && (<input ref={inputRef} type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} className="w-full border dark:border-slate-600 rounded-lg px-3 py-2 mb-5 text-sm focus:ring-2 focus:ring-indigo-500 outline-none bg-gray-50 dark:bg-slate-900 dark:text-slate-100"/>)}
                        <div className="flex gap-2">
                            {type !== 'alert' && (<button onClick={onCancel} className="flex-1 py-2.5 rounded-lg text-sm font-bold text-gray-500 dark:text-slate-400 bg-gray-100 dark:bg-slate-700 hover:bg-gray-200 dark:hover:bg-slate-600 transition-colors">취소</button>)}
                            <button onClick={() => type === 'prompt' ? onConfirm(inputValue) : onConfirm()} className="flex-1 py-2.5 rounded-lg text-sm font-bold text-white bg-indigo-600 hover:bg-indigo-700 transition-colors shadow-sm">확인</button>
                        </div>
                    </div>
                </div>
            );
        };

        const QuickAddressModal = ({ isOpen, nick, onClose, onSubmit }) => {
            const [formData, setFormData] = useState({ realname: '', phone: '', zipcode: '', address: '', detailAddress: '', memo: '' });
            const detailRef = useRef(null);

            useEffect(() => {
                if (isOpen) setFormData({ realname: '', phone: '', zipcode: '', address: '', detailAddress: '', memo: '' });
            }, [isOpen]);

            const handleSearch = () => {
                try {
                    new window.daum.Postcode({
                        oncomplete: function(data) {
                            let fullAddr = data.address;
                            let extraAddr = '';
                            if(data.addressType === 'R'){
                                if(data.bname !== '') extraAddr += data.bname;
                                if(data.buildingName !== '') extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                                if(extraAddr !== '') fullAddr += ' (' + extraAddr + ')';
                            }
                            setFormData(prev => ({ ...prev, zipcode: data.zonecode, address: fullAddr }));
                            setTimeout(() => detailRef.current?.focus(), 100);
                        }
                    }).open();
                } catch (e) {
                    alert("주소 검색 오류가 발생했습니다.");
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!formData.realname.trim()) return alert("수령인 이름을 입력해주세요.");
                const cleanPhone = formData.phone.replace(/[^0-9]/g, '');
                if (!cleanPhone) return alert("유효한 연락처(숫자)를 입력해주세요.");
                if (!formData.address.trim()) return alert("배송 주소를 검색해서 입력해주세요.");
                const finalAddress = `${formData.address} ${formData.detailAddress}`.trim();
                onSubmit({ ...formData, address: finalAddress, phone: cleanPhone, nickname: nick });
            };

            if (!isOpen) return null;

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-[9999] animate-pop" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-full max-w-md mx-4" onClick={e => e.stopPropagation()}>
                        <div className="mb-4 border-b dark:border-slate-700 pb-3 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-2">
                                <Icon name="pencil-line" weight="fill" /> '{nick}' 배송지 빠른 입력
                            </h3>
                            <button onClick={onClose} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><Icon name="x" weight="bold" size={20}/></button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-3">
                            <div className="grid grid-cols-2 gap-3">
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">수령인 이름 (필수)</label>
                                    <input type="text" value={formData.realname} onChange={e=>setFormData({...formData, realname: e.target.value})} className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="이름 입력" autoFocus />
                                </div>
                                <div>
                                    <label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">연락처 (자동 숫자 추출)</label>
                                    <input type="text" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value.replace(/[^0-9]/g, '')})} className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="연락처 (숫자만)" />
                                </div>
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">배송 주소 (필수)</label>
                                <div className="flex gap-2 mb-2">
                                    <input type="text" value={formData.zipcode} readOnly placeholder="우편번호" className="w-24 border dark:border-slate-600 rounded px-3 py-2 text-sm bg-gray-50 dark:bg-slate-700 dark:text-slate-400 outline-none cursor-not-allowed" />
                                    <button type="button" onClick={handleSearch} className="bg-slate-500 hover:bg-slate-600 text-white px-3 py-2 rounded text-sm font-bold shadow-sm transition-colors">주소 검색</button>
                                </div>
                                <input type="text" value={formData.address} readOnly placeholder="검색 버튼을 눌러 기본 주소를 찾아주세요" className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-gray-50 dark:bg-slate-700 dark:text-slate-400 outline-none cursor-not-allowed mb-2" />
                                <input ref={detailRef} type="text" value={formData.detailAddress} onChange={e=>setFormData({...formData, detailAddress: e.target.value})} placeholder="상세 주소 (동, 호수 등)" className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none" />
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">배송 메모 (선택)</label>
                                <input type="text" value={formData.memo} onChange={e=>setFormData({...formData, memo: e.target.value})} className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none" placeholder="배송 요청사항" />
                            </div>
                            <div className="pt-3 flex gap-2">
                                <button type="button" onClick={onClose} className="flex-1 py-2.5 rounded font-bold text-sm bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300 hover:bg-gray-200 transition-colors">취소</button>
                                <button type="submit" className="flex-1 py-2.5 rounded font-bold text-sm bg-indigo-600 text-white hover:bg-indigo-700 transition-colors shadow-sm">저장 및 즉시 적용</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        }

        const OrderItem = memo(({ item, nick, nextItemId, isLast, stockLookup, handleProductChange, handleQuantityUpdate, handleOrderCancel, handleOrderDelete, addOrderLogic }) => {
            const [localProduct, setLocalProduct] = useState(item.product);
            const [localQty, setLocalQty] = useState(item.quantity === '' ? '' : item.quantity);
            const [localPrice, setLocalPrice] = useState(item.price === '' || item.price === 0 ? '' : Number(item.price).toLocaleString());
            const [isProductFocused, setIsProductFocused] = useState(false);
            const [isQtyFocused, setIsQtyFocused] = useState(false);
            const [isPriceFocused, setIsPriceFocused] = useState(false);

            useEffect(() => { if (!isProductFocused) setLocalProduct(item.product); }, [item.product, isProductFocused]);
            useEffect(() => { if (!isQtyFocused) setLocalQty(item.quantity === '' ? '' : item.quantity); }, [item.quantity, isQtyFocused]);
            
            useEffect(() => { 
                if (!isPriceFocused) {
                    setLocalPrice(item.price === '' || item.price === 0 ? '' : Number(item.price).toLocaleString()); 
                }
            }, [item.price, isPriceFocused]);

            useEffect(() => {
                const timer = setTimeout(() => { if (localProduct !== item.product) handleProductChange(item.id, 'product', localProduct); }, 400);
                return () => clearTimeout(timer);
            }, [localProduct, item.product, item.id, handleProductChange]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    const q = localQty === '' || isNaN(parseInt(localQty)) ? '' : parseInt(localQty);
                    if (q !== item.quantity) handleQuantityUpdate(item.id, q);
                }, 400);
                return () => clearTimeout(timer);
            }, [localQty, item.quantity, item.id, handleQuantityUpdate]);

            useEffect(() => {
                const timer = setTimeout(() => {
                    const val = String(localPrice).replace(/,/g, '');
                    if (!isNaN(val) && Number(val) !== Number(item.price)) handleProductChange(item.id, 'price', val);
                }, 400);
                return () => clearTimeout(timer);
            }, [localPrice, item.price, item.id, handleProductChange]);

            const remaining = stockLookup[localProduct];
            let stockBadge = null; 
            if (remaining !== undefined) { 
                if (remaining < 0) stockBadge = <span className="text-red-500 dark:text-red-400 font-bold text-[10px] ml-1 animate-pulse">(재고초과 {remaining})</span>; 
                else if (remaining === 0) stockBadge = <span className="text-red-500 dark:text-red-400 font-bold text-[10px] ml-1">(품절)</span>; 
                else if (remaining <= 2) stockBadge = <span className="text-orange-500 dark:text-orange-400 font-bold text-[10px] ml-1">(마감임박 {remaining})</span>; 
            } 

            return (
                <div className={`flex justify-between items-center text-xs px-1 py-0.5 rounded group transition-colors ${item.isCancelled ? 'bg-red-50/80 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30' : 'hover:bg-gray-50 dark:hover:bg-slate-700'}`}>
                    <div className="flex-1 flex gap-1 items-center">
                        {item.isCancelled && <span className="text-[9px] text-red-500 dark:text-red-400 font-bold shrink-0">[취소]</span>}
                        <input id={`prod-input-${item.id}`} type="text" list={isProductFocused ? "product-list" : undefined} value={localProduct} onChange={(e) => setLocalProduct(e.target.value)} onClick={(e) => e.stopPropagation()} onFocus={(e) => { e.target.select(); setIsProductFocused(true); }} onBlur={() => { setIsProductFocused(false); if (localProduct !== item.product) handleProductChange(item.id, 'product', localProduct); }} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById(`qty-input-${item.id}`)?.focus(); } }} className={`w-full outline-none px-1 rounded transition-colors bg-transparent font-bold ${item.isCancelled ? 'text-gray-400 dark:text-slate-500 line-through bg-transparent' : (item.isUnmodified ? 'text-blue-600 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/20 focus:bg-white dark:focus:bg-slate-700 focus:ring-1 focus:ring-blue-300' : 'focus:bg-white dark:focus:bg-slate-700 focus:ring-1 focus:ring-indigo-100 dark:text-slate-200')}`} placeholder="상품명" disabled={item.isCancelled} />
                        {stockBadge}
                    </div>
                    <div className="flex items-center gap-1 group shrink-0">
                        <div className="relative flex items-center">
                            <input id={`qty-input-${item.id}`} type="number" value={localQty} onChange={(e) => setLocalQty(e.target.value)} onClick={(e) => e.stopPropagation()} onFocus={(e) => { e.target.select(); setIsQtyFocused(true); }} onBlur={() => { setIsQtyFocused(false); const q = localQty === '' || isNaN(parseInt(localQty)) ? '' : parseInt(localQty); if (q !== item.quantity) handleQuantityUpdate(item.id, q); }} onKeyDown={(e) => { if(e.key==='Enter') { e.preventDefault(); document.getElementById(`price-input-${item.id}`)?.focus(); } }} className={`w-12 text-right pr-4 font-bold outline-none rounded py-0.5 transition-colors ${item.isCancelled ? 'text-[11px] bg-transparent line-through text-gray-400 dark:text-slate-500 cursor-not-allowed' : `${Number(localQty) >= 2 ? 'text-[12px] text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30' : 'text-[11px] text-gray-900 dark:text-slate-100 bg-transparent'} hover:bg-gray-100 dark:hover:bg-slate-700 focus:bg-white dark:focus:bg-slate-900 focus:ring-1 focus:ring-indigo-300`}`} disabled={item.isCancelled} />
                            <span className={`absolute right-1 pointer-events-none ${Number(localQty) >= 2 && !item.isCancelled ? 'text-[10px] text-red-600 dark:text-red-400 font-bold' : 'text-[10px] text-gray-500 dark:text-slate-400'}`}>개</span>
                        </div>
