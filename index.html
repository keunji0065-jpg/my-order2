<!DOCTYPE html>
<html lang="ko" class="antialiased">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">

    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin="anonymous"></script>

    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['NanumSquareNeo', 'Pretendard', 'sans-serif'] }, colors: { brand: { 50: '#f8fafc', 500: '#64748b', 600: '#475569', 700: '#334155' }, kakao: '#FEE500' } } } }

    <style>
        @import url("https://cdn.jsdelivr.net/gh/moonspam/NanumSquareNeo/nanumsquareneo.css");
        body { font-family: 'NanumSquareNeo', sans-serif; background-color: #f1f5f9; transition: background-color 0.3s, color 0.3s; }
        body.dark { background-color: #0f172a; color: #f1f5f9; }
        ::-webkit-scrollbar { width: 5px; } ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        .dark ::-webkit-scrollbar-thumb { background: #475569; }
        input[type="number"]::-webkit-inner-spin-button, input[type="number"]::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }
        .processed-chat { text-decoration: line-through; background-color: #f1f5f9 !important; color: #94a3b8 !important; opacity: 0.6; }
        .dark .processed-chat { background-color: #1e293b !important; color: #64748b !important; }
        .selected-chat-active { border-left: 3px solid #64748b; background-color: #f8fafc; }
        .dark .selected-chat-active { border-left-color: #94a3b8; background-color: #1e293b; }
        .keyword-detected { border: 2px solid #94a3b8; background-color: #f8fafc; }
        .dark .keyword-detected { border-color: #64748b; background-color: #1e293b; }
        .animate-pop { animation: pop 0.2s ease-out; }
        @keyframes pop { 0% { transform: scale(0.9); opacity: 0; } 100% { transform: scale(1); opacity: 1; } }
        .custom-checkbox { appearance: none; background-color: #fff; margin: 0; width: 1.4em; height: 1.4em; border: 2px solid #cbd5e1; border-radius: 4px; display: grid; place-content: center; cursor: pointer; transition: all 0.2s; }
        .dark .custom-checkbox { background-color: #1e293b; border-color: #475569; }
        .custom-checkbox::before { content: ""; width: 0.8em; height: 0.8em; transform: scale(0); transition: 120ms transform ease-in-out; box-shadow: inset 1em 1em white; background-color: white; transform-origin: center; clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%); }
        .custom-checkbox:checked { background-color: #475569; border-color: #475569; }
        .custom-checkbox:checked::before { transform: scale(1); }
        .scrollbar-hide::-webkit-scrollbar { display: none; }
        .scrollbar-hide { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="transition-colors duration-300">
    <div id="root"></div>
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef, useCallback, memo } = React;

        const DEFAULT_GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbyvKtCHXSz47oGqNire1eREUJyjMVX_zBcodtGrwyIfYCrtrkzr1X6Q_mKJMzoo5Ev2ug/exec";
        const FIXED_BANK_ACCOUNT = "카카오뱅크 김선정\n7942 18 01611";
        const DEFAULT_CUSTOMER_SHEET_ID = "1ywl4gRvswQpvIYtPVbSROzz7a5elbLieYhqMZmt191U";
        const EMOJI_LIST = ["💙", "💖", "💛", "💚", "💜", "🤍", "❤️", "🖤", "🤎", "💕", "💞", "⭐", "🌟", "✨", "🔥", "💥", "💯", "🎠", "🐎", "🐴", "🦢", "🐆", "🐍", "🐊", "🐢", "🦓", "🦄", "🦋", "💎", "💍", "👑", "💄", "💅", "🧴", "🎀", "🎁", "🛍️", "🛒", "🏷️", "📦", "👜", "👝", "👛", "🎒", "💼", "👠", "👡", "👢", "👟", "🩰", "👞", "👗", "🥻", "🧥", "👕", "👖", "👔", "🧣", "🧤", "🧦", "🧢", "👒", "🎩", "⌚", "🕶️", "👓", "🐶", "🐩", "🐱", "🐈", "🐰", "🐇", "🐻", "🧸", "🐼", "🐨", "🦊", "🐯", "🦁", "🐮", "🐷", "🐸", "🐵", "🐧", "🐥", "🦉", "🐾", "🌸", "🌼", "🍀", "🌹", "🌻", "🌷", "🌿", "🍁", "🌴", "🌵", "🍎", "🍓", "🍒", "🍑", "🍋", "🍊", "🍉", "🍇", "🍍", "🥑", "🥕", "🍔", "🍟", "🍕", "🍰", "🍩", "🍪", "🍫", "🍬", "🍭", "☕", "🧋", "🧃", "🍷", "🥂", "🍻", "✅", "✔️", "❌", "❗", "❓", "📢", "🔔", "🌈", "💰", "💸", "💳", "🧾", "🪙", "🚗", "🚚", "✈️", "📱", "💻", "🎉", "🎈"];

        const Icon = ({ name, className="", weight="regular", size }) => <i className={`ph ph-${name} ${className}`} data-phosphor-icon-weight={weight} style={{fontSize: size}}></i>;
        
        const normalizeString = (str) => String(str || '').replace(/[\s\(\)\[\]\{\}\-\_\.\,\/]/g, '').toLowerCase();

        const getVal = (obj, keys) => { 
            const normalizedObj = {}; 
            Object.keys(obj).forEach(k => {
                const cleanKey = String(k).toLowerCase().replace(/[\s\n\r_()\[\]]/g, '');
                normalizedObj[cleanKey] = obj[k];
            }); 
            for (let k of keys) { 
                const targetKey = String(k).toLowerCase().replace(/[\s\n\r_()\[\]]/g, ''); 
                if (normalizedObj[targetKey] !== undefined && normalizedObj[targetKey] !== null && String(normalizedObj[targetKey]).trim() !== '') {
                    return String(normalizedObj[targetKey]).trim();
                }
            } 
            return ''; 
        };

        const parseNum = (val) => { 
            if (!val) return 0; 
            const n = Number(String(val).replace(/,/g, '')); 
            return isNaN(n) ? 0 : n; 
        };

        const mapCloudOrderToLocal = (o, idx) => {
            const isCardVal = getVal(o, ['isCard', '카드결제', '카드여부', '결제수단']);
            return {
                id: Date.now() + idx + Math.random(),
                customer: getVal(o, ['nickname', 'customer', '닉네임', '주문자', '고객명', '아이디', '성함', '이름']),
                product: getVal(o, ['product', '상품명', '상품', '제품명', '주문제품', '주문상품', '품목', '주문내역', '내용', '품명', '주문제품수량', '주문상품수량']),
                quantity: parseNum(getVal(o, ['qty', 'quantity', '수량', '주문수량', '개수', '수량개'])) || 1,
                price: parseNum(getVal(o, ['price', '가격', '단가', '금액', '주문금액', '판매가', '총금액'])),
                deposit: parseNum(getVal(o, ['deposit', '입금액', '입금', '결제금액', '입금확인', '결제액'])),
                isCancelled: false,
                isUnmodified: false,
                loadedFromCloud: true,
                _isCard: ['true', 'o', '1', '카드', '카드결제', 'y'].includes(String(isCardVal).toLowerCase().trim())
            };
        };

        const getChosung = (str) => {
            if (!str) return '';
            const cho = ["ㄱ","ㄲ","ㄴ","ㄷ","ㄸ","ㄹ","ㅁ","ㅂ","ㅃ","ㅅ","ㅇ","ㅆ","ㅈ","ㅉ","ㅊ","ㅋ","ㅌ","ㅍ","ㅎ"];
            let result = "";
            for (let i = 0; i < str.length; i++) {
                const code = str.charCodeAt(i) - 44032;
                if (code > -1 && code < 11172) result += cho[Math.floor(code / 588)];
                else result += str.charAt(i);
            }
            return result;
        };

        const cleanForMatch = (str) => {
            if (!str) return '';
            let s = String(str).toLowerCase().replace(/\s/g, '');
            s = s.replace(/[—–−_]/g, '-');
            if (s.includes('-')) s = s.split('-')[0];
            s = s.replace(/[\(\)\[\]\{\}\.\,\/]/g, '');
            if (/[가-힣]/.test(s)) s = s.replace(/[a-z0-9]+$/, '');
            return s;
        };

        const getCleanSheetId = (idOrUrl) => {
            if (!idOrUrl) return '';
            const match = idOrUrl.match(/\/d\/([a-zA-Z0-9-_]+)/);
            return match ? match[1] : idOrUrl.trim();
        };

        const formatMMDD = (val) => {
            if (!val) return '';
            let dt = new Date(val);
            if (!isNaN(dt)) return `${String(dt.getMonth() + 1).padStart(2, '0')}/${String(dt.getDate()).padStart(2, '0')}`;
            const match = String(val).match(/(\d{4})[./-]\s*(\d{1,2})[./-]\s*(\d{1,2})/);
            if (match) return `${String(match[2]).padStart(2, '0')}/${String(match[3]).padStart(2, '0')}`;
            return '';
        };

        const useLocalStorage = (key, initialValue) => {
            const [storedValue, setStoredValue] = useState(() => {
                try {
                    const item = window.localStorage.getItem(key);
                    if (!item) return initialValue;
                    const parsed = JSON.parse(item);
                    if (key === 'productInventory' && !Array.isArray(parsed)) {
                        return Object.entries(parsed).map(([name, info]) => ({
                            id: `inv_${Date.now()}_${Math.random()}`,
                            name,
                            price: info.price || 0
                        }));
                    }
                    return parsed;
                } catch (error) { return initialValue; }
            });

            useEffect(() => {
                const timer = setTimeout(() => {
                    const saveData = () => { try { window.localStorage.setItem(key, JSON.stringify(storedValue)); } catch(e) {} };
                    if (window.requestIdleCallback) window.requestIdleCallback(saveData, { timeout: 1000 });
                    else saveData();
                }, 800);
                return () => clearTimeout(timer);
            }, [key, storedValue]);

            const setValue = useCallback((value) => {
                try { setStoredValue(prev => value instanceof Function ? value(prev) : value); } catch (error) {}
            }, []);

            return [storedValue, setValue];
        };

        const downloadExcel = (data, fileName) => {
            const ws = XLSX.utils.json_to_sheet(data);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Sheet1");
            XLSX.writeFile(wb, `${fileName}_${new Date().toLocaleDateString()}.xlsx`);
        };

        // ============================================
        // 컴포넌트: Modals
        // ============================================
        const Modal = ({ isOpen, type, message, onConfirm, onCancel, initialValue }) => {
            const [inputValue, setInputValue] = useState(initialValue || '');
            const inputRef = useRef(null);
            
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (!isOpen) return;
                    if (type !== 'confirm' && type !== 'alert') { 
                        if (e.key === 'Enter') onConfirm(inputValue); 
                    } else { 
                        if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); onConfirm(); } 
                    }
                    if (e.key === 'Escape' && type !== 'alert') onCancel();
                };
                window.addEventListener('keydown', handleKeyDown); 
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [isOpen, type, inputValue, onConfirm, onCancel]);
            
            useEffect(() => { 
                if (isOpen && type === 'prompt' && inputRef.current) { 
                    setInputValue(initialValue || ''); 
                    setTimeout(() => inputRef.current.focus(), 100); 
                } 
            }, [isOpen, type, initialValue]);
            
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[9999] animate-pop" onClick={type === 'alert' ? () => onConfirm() : undefined}>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-80 max-w-sm" onClick={e => e.stopPropagation()}>
                        <div className="mb-4">
                            <h3 className="text-lg font-bold text-center text-slate-800 dark:text-slate-100 mb-2">{type === 'confirm' ? '확인' : type === 'prompt' ? '입력' : '알림'}</h3>
                            <p className="text-sm text-slate-600 dark:text-slate-400 text-center whitespace-pre-wrap leading-relaxed">{message}</p>
                        </div>
                        {type === 'prompt' && (
                            <input ref={inputRef} type="text" value={inputValue} onChange={(e) => setInputValue(e.target.value)} className="w-full border dark:border-slate-600 rounded-lg px-3 py-2 mb-5 text-sm focus:ring-2 focus:ring-slate-500 outline-none bg-slate-50 dark:bg-slate-900 dark:text-slate-100"/>
                        )}
                        <div className="flex gap-2">
                            {type !== 'alert' && (
                                <button onClick={onCancel} className="flex-1 py-2.5 rounded-lg text-sm font-bold text-slate-500 dark:text-slate-400 bg-slate-100 dark:bg-slate-700 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors">취소</button>
                            )}
                            <button onClick={() => type === 'prompt' ? onConfirm(inputValue) : onConfirm()} className="flex-1 py-2.5 rounded-lg text-sm font-bold text-white bg-slate-700 hover:bg-slate-800 transition-colors shadow-sm">확인</button>
                        </div>
                    </div>
                </div>
            );
        };

        const QuickAddressModal = ({ isOpen, nick, initialData, onClose, onSubmit, openModal }) => {
            const [formData, setFormData] = useState({ realname: '', phone: '', zipcode: '', address: '', detailAddress: '', memo: '' });
            const detailRef = useRef(null);

            useEffect(() => {
                if (isOpen) {
                    if (initialData) { 
                        setFormData({ 
                            realname: initialData.realname || '', 
                            phone: initialData.phone || '', 
                            zipcode: initialData.zipcode || '', 
                            address: initialData.address || '', 
                            detailAddress: '', 
                            memo: initialData.memo || '' 
                        }); 
                    } else { 
                        setFormData({ realname: '', phone: '', zipcode: '', address: '', detailAddress: '', memo: '' }); 
                    }
                }
            }, [isOpen, initialData]);

            const handleSearch = () => {
                try {
                    new window.daum.Postcode({
                        oncomplete: function(data) {
                            let fullAddr = data.address; 
                            let extraAddr = '';
                            if(data.addressType === 'R'){
                                if(data.bname !== '') extraAddr += data.bname;
                                if(data.buildingName !== '') extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName);
                                if(extraAddr !== '') fullAddr += ' (' + extraAddr + ')';
                            }
                            setFormData(prev => ({ ...prev, zipcode: data.zonecode, address: fullAddr }));
                            setTimeout(() => detailRef.current?.focus(), 100);
                        }
                    }).open();
                } catch (e) { 
                    if (openModal) openModal("주소 검색 오류가 발생했습니다.", "alert"); 
                }
            };

            const handleSubmit = (e) => {
                e.preventDefault(); 
                const notify = (msg) => openModal ? openModal(msg, "alert") : alert(msg);
                if (!formData.realname.trim()) return notify("수령인 이름을 입력해주세요.");
                const cleanPhone = formData.phone.replace(/[^0-9]/g, '');
                if (!cleanPhone) return notify("유효한 연락처(숫자)를 입력해주세요.");
                if (!formData.address.trim()) return notify("배송 주소를 검색해서 입력해주세요.");
                const zipStr = formData.zipcode ? `(${formData.zipcode}) ` : '';
                const finalAddress = `${zipStr}${formData.address} ${formData.detailAddress}`.trim();
                const targetNick = initialData ? initialData.nickname : nick;
                onSubmit({ ...formData, zipcode: '', address: finalAddress, phone: cleanPhone, nickname: targetNick });
            };

            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[9999] animate-pop" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-full max-w-md mx-4" onClick={e => e.stopPropagation()}>
                        <div className="mb-4 border-b dark:border-slate-700 pb-3 flex justify-between items-center">
                            <h3 className="text-lg font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2"><Icon name="pencil-line" weight="fill" /> '{initialData ? initialData.nickname : nick}' 배송지 {initialData ? '수정' : '빠른 입력'}</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><Icon name="x" weight="bold" size={20}/></button>
                        </div>
                        <form onSubmit={handleSubmit} className="space-y-3">
                            <div className="grid grid-cols-2 gap-3">
                                <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">수령인 이름 (필수)</label><input type="text" value={formData.realname} onChange={e=>setFormData({...formData, realname: e.target.value})} className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-slate-500 outline-none" placeholder="이름 입력" autoFocus /></div>
                                <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">연락처 (자동 숫자 추출)</label><input type="text" value={formData.phone} onChange={e=>setFormData({...formData, phone: e.target.value.replace(/[^0-9]/g, '')})} className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-slate-500 outline-none" placeholder="연락처 (숫자만)" /></div>
                            </div>
                            <div>
                                <label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">배송 주소 (필수)</label>
                                <div className="flex gap-2 mb-2"><input type="text" value={formData.zipcode} readOnly placeholder="우편번호" className="w-24 border dark:border-slate-600 rounded px-3 py-2 text-sm bg-slate-50 dark:bg-slate-700 dark:text-slate-400 outline-none cursor-not-allowed" /><button type="button" onClick={handleSearch} className="bg-slate-600 hover:bg-slate-700 text-white px-3 py-2 rounded text-sm font-bold shadow-sm transition-colors">주소 검색</button></div>
                                <input type="text" value={formData.address} readOnly placeholder="검색 버튼을 눌러 기본 주소를 찾아주세요" className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-slate-50 dark:bg-slate-700 dark:text-slate-400 outline-none cursor-not-allowed mb-2" />
                                <input ref={detailRef} type="text" value={formData.detailAddress} onChange={e=>setFormData({...formData, detailAddress: e.target.value})} placeholder="상세 주소 (동, 호수 등)" className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-slate-500 outline-none" />
                            </div>
                            <div><label className="block text-[10px] font-bold text-slate-500 dark:text-slate-400 mb-1">배송 메모 (선택)</label><input type="text" value={formData.memo} onChange={e=>setFormData({...formData, memo: e.target.value})} className="w-full border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-slate-500 outline-none" placeholder="배송 요청사항" /></div>
                            <div className="pt-3 flex gap-2">
                                <button type="button" onClick={onClose} className="flex-1 py-2.5 rounded font-bold text-sm bg-slate-100 dark:bg-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-200 transition-colors">취소</button>
                                <button type="submit" className="flex-1 py-2.5 rounded font-bold text-sm bg-slate-700 text-white hover:bg-slate-800 transition-colors shadow-sm">저장 및 즉시 적용</button>
                            </div>
                        </form>
                    </div>
                </div>
            );
        };

        const VIPManagementModal = ({ isOpen, onClose, specialCustomers, setSpecialCustomers, openModal }) => {
            const [newVipNick, setNewVipNick] = useState('');
            if (!isOpen) return null;
            
            const vipList = Object.entries(specialCustomers || {}).filter(([nick, data]) => data.type === 'vip');
            
            const handleAddVip = (e) => {
                e.preventDefault(); 
                const cleanNick = newVipNick.trim(); 
                if (!cleanNick) return;
                setSpecialCustomers(prev => {
                    const nickNorm = normalizeString(cleanNick); 
                    const existingKey = Object.keys(prev).find(k => normalizeString(k) === nickNorm);
                    if (existingKey && prev[existingKey].type === 'vip') { 
                        if (openModal) openModal("이미 등록된 VIP입니다.", "alert"); 
                        return prev; 
                    }
                    return { ...prev, [cleanNick]: { type: 'vip', memo: '', purchaseCount: 0, noShowCount: 0 } };
                });
                setNewVipNick('');
            };
            
            const handleRemoveVip = (nickToRemove) => { 
                setSpecialCustomers(prev => { const next = { ...prev }; delete next[nickToRemove]; return next; }); 
            };
            
            return (
                <div className="fixed inset-0 bg-slate-900/60 flex items-center justify-center z-[9999] animate-pop" onClick={onClose}>
                    <div className="bg-white dark:bg-slate-800 rounded-xl shadow-2xl p-6 w-full max-w-md mx-4 flex flex-col max-h-[80vh]" onClick={e => e.stopPropagation()}>
                        <div className="mb-4 border-b dark:border-slate-700 pb-3 flex justify-between items-center shrink-0">
                            <h3 className="text-lg font-bold text-slate-800 dark:text-slate-200 flex items-center gap-2"><Icon name="crown" weight="fill" /> VIP 특별 관리 대장</h3>
                            <button onClick={onClose} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-200"><Icon name="x" weight="bold" size={20}/></button>
                        </div>
                        <form onSubmit={handleAddVip} className="flex gap-2 mb-4 shrink-0">
                            <input type="text" value={newVipNick} onChange={e=>setNewVipNick(e.target.value)} placeholder="추가할 VIP 닉네임" className="flex-1 border dark:border-slate-600 rounded px-3 py-2 text-sm bg-transparent dark:text-white focus:ring-2 focus:ring-slate-500 outline-none" />
                            <button type="submit" className="bg-slate-700 hover:bg-slate-800 text-white px-4 py-2 rounded text-sm font-bold transition-colors shadow-sm">추가</button>
                        </form>
                        <div className="flex-1 overflow-y-auto space-y-2 pr-1">
                            {vipList.length === 0 ? (<div className="text-center text-slate-500 dark:text-slate-400 py-8 text-sm">등록된 VIP가 없습니다.</div>) : (
                                vipList.map(([nick, data]) => (
                                    <div key={nick} className="flex justify-between items-center p-2.5 border dark:border-slate-700 rounded-lg bg-slate-50 dark:bg-slate-700/50 transition-colors hover:bg-slate-100 dark:hover:bg-slate-700">
                                        <span className="font-bold text-slate-800 dark:text-slate-100">{nick}</span>
                                        <button onClick={() => handleRemoveVip(nick)} className="text-red-500 hover:bg-red-50 dark:hover:bg-red-900/30 p-1.5 rounded transition-colors text-xs font-bold flex items-center gap-1"><Icon name="trash" weight="bold" /> 해제</button>
                                    </div>
                                ))
                            )}
                        </div>
                        <div className="mt-4 pt-3 border-t dark:border-slate-700 text-[10px] text-slate-500 dark:text-slate-400 text-center">💡 VIP로 등록된 고객은 주문 시 자동으로 배송비가 0원 처리됩니다.</div>
                    </div>
                </div>
            );
        };

        // ============================================
        // 컴포넌트: 재고 개별 행
        // ============================================
        const InventoryItemRow = memo(({ item, orders, setOrders, inventory, setInventory, setProductHistory, openModal, expandedInventoryItem, setExpandedInventoryItem, setManualProduct, setCurrentSearchTerm, setManualPrice, setIsFixedProductMode, customerPaidStatus }) => {
            const [isEditing, setIsEditing] = useState(false);
            const [localName, setLocalName] = useState(item.name);
            const [localPrice, setLocalPrice] = useState(item.price === 0 || item.price === '' ? '' : Number(item.price).toLocaleString());

            useEffect(() => { setLocalName(item.name); }, [item.name]);
            useEffect(() => { setLocalPrice(item.price === 0 || item.price === '' ? '' : Number(item.price).toLocaleString()); }, [item.price]);

            const activeOrders = useMemo(() => orders.filter(o => o.product === item.name && !o.isCancelled), [orders, item.name]);
            const orderedCount = activeOrders.reduce((sum, o) => sum + Number(o.quantity || 0), 0);
            
            // 🔥 한 고객이 같은 상품을 여러 번 샀을 경우 수량을 하나로 합치고 정리하는 로직
            const aggregatedOrders = useMemo(() => {
                const groups = {};
                activeOrders.forEach(o => {
                    if(!groups[o.customer]) {
                        groups[o.customer] = { customer: o.customer, quantity: 0, orderIds: [] };
                    }
                    groups[o.customer].quantity += Number(o.quantity || 0);
                    groups[o.customer].orderIds.push(o.id);
                });
                return Object.values(groups).sort((a, b) => a.customer.localeCompare(b.customer, 'ko'));
            }, [activeOrders]);

            const isExpanded = expandedInventoryItem === item.name;

            const handleSave = () => {
                const newName = localName.trim();
                const newPrice = Number(String(localPrice).replace(/,/g, ''));
                if (!newName) { openModal('상품명을 입력해주세요.', 'alert'); return; }
                if (newName !== item.name && inventory.some(i => i.name === newName && i.id !== item.id)) {
                    openModal('이미 동일한 이름의 상품이 있습니다.', 'alert');
                    setLocalName(item.name);
                    return;
                }

                setInventory(prev => prev.map(i => i.id === item.id ? { ...i, name: newName, price: newPrice } : i));
                
                if (newName !== item.name || newPrice !== item.price) {
                    setOrders(prev => prev.map(o => {
                        if (o.product === item.name) {
                            return { ...o, product: newName, price: (Number(o.quantity) || 0) * newPrice };
                        }
                        return o;
                    }));
                    setProductHistory(prev => {
                        const next = {...prev};
                        if (newName !== item.name) { next[newName] = newPrice; } 
                        else { next[item.name] = newPrice; }
                        return next;
                    });
                }
                setIsEditing(false);
            };

            const handleDelete = () => {
                openModal(`'${item.name}' 항목을 재고 목록에서 삭제하시겠습니까?\n(기존 주문 내역은 유지됩니다)`, 'confirm', () => {
                    setInventory(prev => prev.filter(i => i.id !== item.id));
                });
            };

            return (
                <div className="flex flex-col bg-white dark:bg-slate-800 rounded border border-slate-200 dark:border-slate-700 shadow-sm overflow-hidden">
                    <div className="flex items-center justify-between p-1.5 text-[11px] hover:bg-slate-100 dark:hover:bg-slate-700 transition-colors">
                        {isEditing ? (
                            <div className="flex-1 flex gap-1 items-center min-w-0 pr-1">
                                <input autoFocus type="text" value={localName} onChange={e=>setLocalName(e.target.value)} onKeyDown={e=>{if(e.key==='Enter')handleSave();}} className="w-full border dark:border-slate-600 bg-transparent dark:text-white px-1 py-0.5 rounded text-[10px] outline-none focus:ring-1 focus:ring-slate-500" placeholder="상품명" />
                                <input type="text" value={localPrice} onChange={e=>{const v = e.target.value.replace(/,/g, ''); if(!isNaN(v)) setLocalPrice(v ? Number(v).toLocaleString() : '');}} onKeyDown={e=>{if(e.key==='Enter')handleSave();}} className="w-14 border dark:border-slate-600 bg-transparent dark:text-white px-1 py-0.5 rounded text-[10px] text-right outline-none focus:ring-1 focus:ring-slate-500" placeholder="단가" />
                                <button onClick={handleSave} className="bg-slate-600 hover:bg-slate-700 text-white px-1.5 py-0.5 rounded shadow-sm"><Icon name="check" weight="bold"/></button>
                                <button onClick={()=>setIsEditing(false)} className="bg-slate-400 hover:bg-slate-500 text-white px-1.5 py-0.5 rounded shadow-sm"><Icon name="x" weight="bold"/></button>
                                <button onClick={handleDelete} className="bg-red-500 hover:bg-red-600 text-white px-1.5 py-0.5 rounded shadow-sm ml-1"><Icon name="trash" weight="bold"/></button>
                            </div>
                        ) : (
                            <>
                                <div className="flex-1 font-bold text-slate-800 dark:text-slate-200 truncate pr-1 cursor-pointer select-none" title="클릭: 복사 / 더블클릭: 자동 고정 입력"
                                    onClick={(e) => {
                                        e.stopPropagation();
                                        const textArea = document.createElement("textarea");
                                        textArea.value = item.name;
                                        document.body.appendChild(textArea);
                                        textArea.select();
                                        try { document.execCommand('copy'); } catch (err) {}
                                        document.body.removeChild(textArea);
                                        const el = e.currentTarget;
                                        el.classList.add('text-green-600', 'dark:text-green-400');
                                        setTimeout(() => el.classList.remove('text-green-600', 'dark:text-green-400'), 300);
                                    }}
                                    onDoubleClick={(e) => {
                                        e.stopPropagation();
                                        setManualProduct(item.name);
                                        setCurrentSearchTerm(item.name);
                                        setManualPrice(item.price ? Number(item.price).toLocaleString() : '');
                                        setIsFixedProductMode(true);
                                        document.getElementById('manual-prod-input')?.focus();
                                    }}
                                >
                                    {item.name}
                                </div>
                                <button onClick={(e) => { e.stopPropagation(); setIsEditing(true); }} className="text-slate-400 hover:text-slate-600 dark:hover:text-slate-300 w-5 flex justify-center shrink-0"><Icon name="pencil-simple" weight="bold"/></button>
                                <div className="w-12 text-center text-[11px] text-slate-800 dark:text-slate-300 font-bold shrink-0">{item.price ? Number(item.price).toLocaleString() : '0'}</div>
                                <div className="w-10 text-center text-slate-600 dark:text-slate-400 font-bold shrink-0">{orderedCount}</div>
                                <button onClick={(e) => { e.stopPropagation(); setExpandedInventoryItem(isExpanded ? null : item.name); }} className={`ml-1 p-0.5 rounded text-slate-400 hover:text-slate-600 hover:bg-slate-200 dark:hover:bg-slate-600 transition-colors shrink-0 w-5 flex justify-center ${isExpanded ? 'bg-slate-200 dark:bg-slate-600 text-slate-700' : ''}`}><Icon name="caret-down" weight="bold" className={`transition-transform ${isExpanded ? 'rotate-180' : ''}`} /></button>
                            </>
                        )}
                    </div>
                    {isExpanded && !isEditing && (
                        <div className="bg-slate-50 dark:bg-slate-800/50 border-t border-slate-100 dark:border-slate-700 p-1.5 flex flex-col gap-1">
                            <div className="flex justify-between items-center mb-1">
                                <span className="text-[10px] font-bold text-slate-600 dark:text-slate-400 flex items-center gap-1"><Icon name="users" weight="fill" /> 주문 고객 ({aggregatedOrders.length}명)</span>
                                <button onClick={(e) => {
                                    e.stopPropagation();
                                    if(aggregatedOrders.length === 0) return;
                                    
                                    let text = `[${item.name} / ${aggregatedOrders.length}명]\n`;
                                    for(let k=0; k<aggregatedOrders.length; k+=2) {
                                        const name1 = aggregatedOrders[k].quantity > 1 ? `${aggregatedOrders[k].customer}(${aggregatedOrders[k].quantity})` : aggregatedOrders[k].customer;
                                        if(aggregatedOrders[k+1]) {
                                            const name2 = aggregatedOrders[k+1].quantity > 1 ? `${aggregatedOrders[k+1].customer}(${aggregatedOrders[k+1].quantity})` : aggregatedOrders[k+1].customer;
                                            text += `${name1} / ${name2}\n`;
                                        } else {
                                            text += `${name1}\n`;
                                        }
                                    }
                                    
                                    const textArea = document.createElement("textarea");
                                    textArea.value = text; document.body.appendChild(textArea); textArea.select();
                                    try { document.execCommand('copy'); openModal('명단이 2열로 복사되었습니다!', 'alert'); } catch (err) {}
                                    document.body.removeChild(textArea);
                                }} className="text-[9px] bg-slate-200 dark:bg-slate-700 text-slate-700 dark:text-slate-300 border border-slate-300 dark:border-slate-600 hover:bg-slate-300 dark:hover:bg-slate-600 px-1.5 py-0.5 rounded font-bold transition-colors shadow-sm">2열 복사</button>
                            </div>
                            {aggregatedOrders.length === 0 ? (
                                <div className="text-center text-[10px] text-slate-400 py-2">주문 내역이 없습니다.</div>
                            ) : (
                                <div className="grid grid-cols-2 gap-1 max-h-[160px] overflow-y-auto pr-1">
                                    {aggregatedOrders.map(agg => {
                                        const isPaid = customerPaidStatus && customerPaidStatus[agg.customer];
                                        const textColor = isPaid ? "text-slate-700 dark:text-slate-300" : "text-red-500 font-bold dark:text-red-400";
                                        
                                        return (
                                            <div key={agg.customer} className="flex justify-between items-center bg-white dark:bg-slate-800 p-1 rounded border border-slate-200 dark:border-slate-700 shadow-sm text-[10px] group hover:border-slate-300 dark:hover:border-slate-600 min-w-0">
                                                <span className={`cursor-pointer hover:underline transition-colors truncate flex-1 ${textColor}`} onClick={(e) => {
                                                    e.stopPropagation();
                                                    const textArea = document.createElement("textarea"); textArea.value = agg.customer; document.body.appendChild(textArea); textArea.select();
                                                    try { document.execCommand('copy'); openModal(`'${agg.customer}' 닉네임 복사 완료!`, 'alert'); } catch (err) {}
                                                    document.body.removeChild(textArea);
                                                }} title="클릭하여 닉네임 복사">
                                                    {agg.customer} {agg.quantity > 1 && <span className="text-slate-500 ml-0.5">({agg.quantity}개)</span>}
                                                </span>
                                                <button onClick={(e) => {
                                                    e.stopPropagation();
                                                    openModal(`'${agg.customer}'님의 '${item.name}' 주문을 전부 삭제하시겠습니까?`, 'confirm', () => {
                                                        setOrders(prev => prev.filter(order => !agg.orderIds.includes(order.id)));
                                                    });
                                                }} className="text-red-400 hover:text-red-600 bg-red-50 hover:bg-red-100 dark:bg-red-900/20 dark:hover:bg-red-900/40 px-1.5 py-0.5 rounded font-bold transition-colors shrink-0 ml-1 opacity-0 group-hover:opacity-100">삭제</button>
                                            </div>
                                        );
                                    })}
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        });

        // ============================================
        // 컴포넌트: 주문 항목 (기본 블록)
        // ============================================
        const OrderItem = memo(({ item, nick, nextItemId, isLast, handleProductChange, handleQuantityUpdate, handleOrderCancel, handleOrderDelete, addOrderLogic, setSelectedNick }) => {
            const [localProduct, setLocalProduct] = useState(item.product); 
            const [localQty, setLocalQty] = useState(item.quantity === '' ? '' : item.quantity); 
            const [localPrice, setLocalPrice] = useState(item.price === '' || item.price === 0 ? '' : Number(item.price).toLocaleString());
            const [isProductFocused, setIsProductFocused] = useState(false); 
            const [isQtyFocused, setIsQtyFocused] = useState(false); 
            const [isPriceFocused, setIsPriceFocused] = useState(false);
            
            useEffect(() => { if (!isProductFocused) setLocalProduct(item.product); }, [item.product, isProductFocused]); 
            useEffect(() => { if (!isQtyFocused) setLocalQty(item.quantity === '' ? '' : item.quantity); }, [item.quantity, isQtyFocused]); 
            useEffect(() => { if (!isPriceFocused) setLocalPrice(item.price === '' || item.price === 0 ? '' : Number(item.price).toLocaleString()); }, [item.price, isPriceFocused]);
            
            return (
                <div className={`flex justify-between items-center text-xs px-1 py-0.5 rounded group transition-colors ${item.isCancelled ? 'bg-red-50/80 dark:bg-red-900/10 border border-red-100 dark:border-red-900/30' : 'hover:bg-slate-100 dark:hover:bg-slate-700'}`}>
                    <div className="flex-1 flex gap-1 items-center">
                        {item.isCancelled && <span className="text-[9px] text-red-500 dark:text-red-400 font-bold shrink-0">[취소]</span>}
                        <input id={`prod-input-${item.id}`} type="text" list={isProductFocused ? "product-list" : undefined} value={localProduct} onChange={(e) => setLocalProduct(e.target.value)} onClick={(e) => e.stopPropagation()} onFocus={(e) => { e.target.select(); setIsProductFocused(true); setSelectedNick(nick); }} onBlur={() => { setIsProductFocused(false); if (localProduct !== item.product) handleProductChange(item.id, 'product', localProduct); }} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById(`qty-input-${item.id}`)?.focus(); } }} className={`w-full outline-none px-1 rounded transition-colors bg-transparent font-bold ${item.isCancelled ? 'text-slate-400 dark:text-slate-500 line-through bg-transparent' : (item.isUnmodified ? 'text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700/50 focus:bg-white dark:focus:bg-slate-600 focus:ring-1 focus:ring-slate-400' : 'focus:bg-white dark:focus:bg-slate-600 focus:ring-1 focus:ring-slate-300 dark:text-slate-200')}`} placeholder="상품명" disabled={item.isCancelled} />
                    </div>
                    <div className="flex items-center gap-1 group shrink-0">
                        <div className="relative flex items-center">
                            <input id={`qty-input-${item.id}`} type="number" value={localQty} onChange={(e) => setLocalQty(e.target.value)} onClick={(e) => e.stopPropagation()} onFocus={(e) => { e.target.select(); setIsQtyFocused(true); setSelectedNick(nick); }} onBlur={() => { setIsQtyFocused(false); const q = localQty === '' || isNaN(parseInt(localQty)) ? '' : parseInt(localQty); if (q !== item.quantity) handleQuantityUpdate(item.id, q); }} onKeyDown={(e) => { if(e.key==='Enter') { e.preventDefault(); document.getElementById(`price-input-${item.id}`)?.focus(); } }} className={`w-12 text-right pr-4 font-bold outline-none rounded py-0.5 transition-colors ${item.isCancelled ? 'text-[11px] bg-transparent line-through text-slate-400 dark:text-slate-500 cursor-not-allowed' : `${Number(localQty) >= 2 ? 'text-[12px] text-red-600 dark:text-red-400 bg-red-50 dark:bg-red-900/30' : 'text-[11px] text-slate-800 dark:text-slate-200 bg-transparent'} hover:bg-slate-200 dark:hover:bg-slate-600 focus:bg-white dark:focus:bg-slate-800 focus:ring-1 focus:ring-slate-400`}`} disabled={item.isCancelled} />
                            <span className={`absolute right-1 pointer-events-none ${Number(localQty) >= 2 && !item.isCancelled ? 'text-[10px] text-red-600 dark:text-red-400 font-bold' : 'text-[10px] text-slate-500 dark:text-slate-400'}`}>개</span>
                        </div>
                        <input id={`price-input-${item.id}`} type="text" value={localPrice} onChange={(e) => { const val = e.target.value.replace(/,/g, ''); if (!isNaN(val) && val !== '') setLocalPrice(Number(val).toLocaleString()); else if (val === '') setLocalPrice(''); }} onClick={(e) => e.stopPropagation()} onFocus={(e) => { e.target.select(); setIsPriceFocused(true); setSelectedNick(nick); }} onBlur={() => { setIsPriceFocused(false); const val = String(localPrice).replace(/,/g, ''); if (!isNaN(val) && Number(val) !== Number(item.price)) { handleProductChange(item.id, 'price', val); } }} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); const val = String(localPrice).replace(/,/g, ''); if (!isNaN(val) && Number(val) !== Number(item.price)) { handleProductChange(item.id, 'price', val); } if (!isLast && nextItemId) { document.getElementById(`prod-input-${nextItemId}`)?.focus(); } else { addOrderLogic(nick, '', 1, true, item.id); } } }} className={`w-16 text-right bg-transparent outline-none px-1 rounded transition-colors font-bold ${item.isCancelled ? 'line-through text-slate-400 dark:text-slate-500 cursor-not-allowed' : (item.isUnmodified ? 'text-slate-600 dark:text-slate-300 bg-slate-100 dark:bg-slate-700/50' : 'text-slate-700 dark:text-slate-200 hover:bg-slate-100 dark:hover:bg-slate-700 focus:bg-white dark:focus:bg-slate-800 focus:ring-1 focus:ring-slate-400 focus:text-slate-800 dark:focus:text-slate-100')} ${Number(item.price) === 0 && !item.isCancelled ? 'bg-red-50 dark:bg-red-900/10 border-b border-red-300 dark:border-red-900' : ''}`} disabled={item.isCancelled} />
                        <button onClick={(e)=>{e.stopPropagation(); handleOrderCancel(item.id); setSelectedNick(nick);}} className={`ml-1 ${item.isCancelled ? "text-slate-500 hover:text-slate-700" : "text-slate-300 dark:text-slate-600 hover:text-red-500"}`} title={item.isCancelled ? "취소 철회" : "주문 취소"}><Icon name={item.isCancelled ? "arrow-u-up-left" : "prohibit"} weight="bold"/></button>
                        <button onClick={(e)=>{e.stopPropagation(); handleOrderDelete(item.id); setSelectedNick(nick);}} className="text-slate-300 dark:text-slate-600 hover:text-red-500 ml-1"><Icon name="trash" weight="bold"/></button>
                    </div>
                </div>
            );
        }, (prev, next) => {
            if (prev.item.product !== next.item.product || prev.item.quantity !== next.item.quantity || prev.item.price !== next.item.price || prev.item.isCancelled !== next.item.isCancelled || prev.item.deposit !== next.item.deposit || prev.item.isUnmodified !== next.item.isUnmodified) return false;
            if (prev.nick !== next.nick || prev.isLast !== next.isLast) return false;
            return true;
        });

        // ============================================
        // 컴포넌트: 주문서 블록 (고객별)
        // ============================================
        const CustomerBlock = memo(({ nick, items, isSelected, currentShipping, isCard, isPaidState, grandTotal, depositTotal, balance, baseGrandTotal, baseBalance, addr, addrType, addressMapping, autoDepositorName, displayDepositorName, isAutoDepositor, depositorNames, copyStatus, isOrderConfirmed, isEditingShipping, setSelectedNick, addOrderLogic, handleNicknameEdit, toggleCardPayment, handleShippingChange, setEditingShippingNick, openModal, setDepositorNames, handleFullDepositToggle, copyOrderSheet, handleOrderCheckToggle, handleAddressUnmapping, handleAddressMapping, handleProductChange, handleQuantityUpdate, handleOrderCancel, handleOrderDelete, toggleVIP, specialCustomers, onOpenQuickAddress, findAddressSuggestions }) => {
            let borderClass = 'border-transparent', headerBgClass = 'bg-white dark:bg-slate-800';
            if (isCard) { borderClass = 'border-slate-300 dark:border-slate-700 ring-1 ring-slate-300 dark:ring-slate-700'; headerBgClass = 'bg-slate-50 dark:bg-slate-800/80'; } 
            else if (!isPaidState && balance > 0) { borderClass = 'border-red-200 dark:border-red-900 ring-1 ring-red-200 dark:ring-red-900'; headerBgClass = 'bg-red-50 dark:bg-red-900/10'; } 
            else if (balance < 0 && !isCard) { borderClass = 'border-slate-300 dark:border-slate-600 ring-1 ring-slate-300 dark:ring-slate-600'; headerBgClass = 'bg-slate-100 dark:bg-slate-800/50'; } 
            else if (isPaidState) { borderClass = 'border-slate-200 dark:border-slate-700'; headerBgClass = 'bg-white dark:bg-slate-800'; } 
            if (isSelected) { headerBgClass = 'bg-slate-100 dark:bg-slate-700/80'; borderClass = 'border-slate-500 dark:border-slate-400 ring-2 ring-slate-400 dark:ring-slate-500 shadow-lg relative z-10'; }
            
            const suggestions = useMemo(() => findAddressSuggestions ? findAddressSuggestions(nick) : [], [nick, findAddressSuggestions]);
            const isVip = useMemo(() => { const nickNorm = normalizeString(nick); const key = Object.keys(specialCustomers || {}).find(k => normalizeString(k) === nickNorm); return key && specialCustomers[key].type === 'vip'; }, [specialCustomers, nick]);

            return (
                <div onClick={() => setSelectedNick(prev => prev === nick ? null : nick)} className={`bg-white dark:bg-slate-800 rounded shadow-sm transition-all overflow-hidden cursor-pointer ${borderClass} border mb-1.5`}>
                    <div className={`px-2 py-1 flex justify-between items-center border-b dark:border-slate-700 ${headerBgClass}`}>
                        <div className="flex flex-col gap-0.5 flex-1 min-w-0">
                            <div className="flex items-center gap-1 flex-wrap mb-0.5">

                                    <div className="flex items-center gap-1 flex-wrap">
                                        {addrType === 'multiple' ? (<span className="text-orange-600 dark:text-orange-400 bg-orange-50 dark:bg-orange-900/20 px-1.5 py-0.5 rounded border border-orange-200 dark:border-orange-800 text-[10px] flex items-center gap-1 font-bold animate-pulse shrink-0"><Icon name="warning-diamond" weight="fill"/> ⚠️ 중복(수동매칭필요)</span>) : (<span className="text-red-400 dark:text-red-900/60 text-[10px] flex items-center gap-1 shrink-0"><Icon name="warning-circle" weight="fill"/> 주소없음</span>)}

        }, (prev, next) => {
            if (prev.nick !== next.nick || prev.isSelected !== next.isSelected || prev.currentShipping !== next.currentShipping || prev.isCard !== next.isCard || prev.isPaidState !== next.isPaidState || prev.grandTotal !== next.grandTotal || prev.depositTotal !== next.depositTotal || prev.balance !== next.balance || prev.isOrderConfirmed !== next.isOrderConfirmed || prev.isEditingShipping !== next.isEditingShipping || prev.displayDepositorName !== next.displayDepositorName || prev.addr?.address !== next.addr?.address || prev.addr?.realname !== next.addr?.realname || prev.addr?.phone !== next.addr?.phone || prev.copyStatus[prev.nick] !== next.copyStatus[next.nick]) return false;
            const pVip = prev.specialCustomers && prev.specialCustomers[normalizeString(prev.nick)]?.type === 'vip';
            const nVip = next.specialCustomers && next.specialCustomers[normalizeString(next.nick)]?.type === 'vip';
            if (pVip !== nVip) return false;
            if (prev.items.length !== next.items.length) return false;
            for (let i = 0; i < prev.items.length; i++) {
                const pItem = prev.items[i], nItem = next.items[i];
                if (pItem.product !== nItem.product || pItem.quantity !== nItem.quantity || pItem.price !== nItem.price || pItem.isCancelled !== nItem.isCancelled || pItem.deposit !== nItem.deposit || pItem.isUnmodified !== nItem.isUnmodified) return false;
            }
            return true;
        });

        // ============================================
        // 컴포넌트: 탭 (LiveTab)
        // ============================================
        const LiveTab = ({ orders, setOrders, productHistory, setProductHistory, quickShipping, shippingOverrides, setShippingOverrides, bankAccount, googleScriptUrl, addressScriptUrl, inventoryScriptUrl, addresses, setAddresses, cardPayments, setCardPayments, matchedDeposits, setMatchedDeposits, depositorNames, setDepositorNames, clickedChats, setClickedChats, openModal, keywords, setKeywords, sentAddressRequests, setSentAddressRequests, deletedDepositIds, setDeletedDepositIds, checkedOrders, setCheckedOrders, addressMapping, setAddressMapping, templateConfig, specialCustomers, setSpecialCustomers, inventory, setInventory, quickMessages, customerSheetId, handleResetAllData }) => {
            const [chats, setChats] = useState([]);
            const [serverDeposits, setServerDeposits] = useState([]);
            const [manualDeposits, setManualDeposits] = useState([]);
            const [selectedNick, setSelectedNick] = useState(null);
            const [manualNick, setManualNick] = useState('');
            const [manualProduct, setManualProduct] = useState('');
            const [manualPrice, setManualPrice] = useState('');
            const [isFixedProductMode, setIsFixedProductMode] = useState(false);
            const [chatSearch, setChatSearch] = useState('');
            const [depositSearch, setDepositSearch] = useState('');
            const [addressSearch, setAddressSearch] = useState(''); 
            const [orderSearch, setOrderSearch] = useState('');
            const [filterStatus, setFilterStatus] = useState('all');
            const [expandedInventoryItem, setExpandedInventoryItem] = useState(null);
            
            const [newInvName, setNewInvName] = useState('');
            const [newInvPrice, setNewInvPrice] = useState('');
            const [isBatchModalOpen, setIsBatchModalOpen] = useState(false);
            
            const deferredOrderSearch = React.useDeferredValue(orderSearch);
            const deferredChatSearch = React.useDeferredValue(chatSearch);

            const [keywordInput, setKeywordInput] = useState('');
            const [showKeywordOnly, setShowKeywordOnly] = useState(false);
            const [connectionStatus, setConnectionStatus] = useState({ code: 'loading', msg: '연결 중...' });
            const [copyStatus, setCopyStatus] = useState({});
            const [depositCopyStatus, setDepositCopyStatus] = useState({}); 
            const [isSaving, setIsSaving] = useState(false);
            const [editingShippingNick, setEditingShippingNick] = useState(null);
            const [currentSearchTerm, setCurrentSearchTerm] = useState('');
            const [lastAddedOrderId, setLastAddedOrderId] = useState(null);
            
            const [showNickSuggestions, setShowNickSuggestions] = useState(false);
            const [quickMsgCopyStatus, setQuickMsgCopyStatus] = useState({});
            const [newDepositName, setNewDepositName] = useState('');
            const [newDepositAmount, setNewDepositAmount] = useState('');

            const [displayLimit, setDisplayLimit] = useState(30);
            const [quickAddrModal, setQuickAddrModal] = useState({ isOpen: false, nick: '', editData: null });
            
            const sortOrderCache = useRef([]);
            const [hiddenChatIds, setHiddenChatIds] = useLocalStorage('hiddenChatIds', []);

            // 💡 ESC 만능 초기화 키 (모든 상태를 초기화합니다)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.key === 'Escape') {
                        setSelectedNick(null);
                        setIsFixedProductMode(false);
                        setManualNick('');
                        setManualProduct('');
                        setManualPrice('');
                        setCurrentSearchTerm('');
                        setIsBatchModalOpen(false);
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, []);

            useEffect(() => { localStorage.setItem('hiddenChatIds', JSON.stringify([...hiddenChatIds])); }, [hiddenChatIds]);

            useEffect(() => {
                const onReset = () => {
                    setHiddenChatIds([]);
                    setIgnoredAutoMatch(new Set());
                    setChats([]);
                    setServerDeposits([]);
                    setManualDeposits([]);
                    setChatSearch('');
                    setDepositSearch('');
                };
                window.addEventListener('appResetEvent', onReset);
                return () => window.removeEventListener('appResetEvent', onReset);
            }, [setHiddenChatIds]);

            const bringToTop = useCallback((rawNick) => {
                if (!rawNick) return;
                const cNick = String(rawNick).replace(/@/g, '').trim();
                if (sortOrderCache.current) {
                    const idx = sortOrderCache.current.indexOf(cNick);
                    if (idx !== -1) sortOrderCache.current.splice(idx, 1);
                    sortOrderCache.current.unshift(cNick);
                }
            }, []);

            const [ignoredAutoMatch, setIgnoredAutoMatch] = useState(() => {
                const saved = localStorage.getItem('ignoredAutoMatch');
                return saved ? new Set(JSON.parse(saved)) : new Set();
            });
            useEffect(() => { localStorage.setItem('ignoredAutoMatch', JSON.stringify([...ignoredAutoMatch])); }, [ignoredAutoMatch]);

            const handleRematchAll = useCallback(() => {
                openModal("모든 입금 매칭을 초기화하고 처음부터 다시 자동 매칭하시겠습니까?\n\n(수동으로 매칭/해제했던 내역과 현재 주문서에 강제로 입력된 입금액이 모두 0으로 초기화된 후, 현재 입금 리스트를 바탕으로 재계산됩니다.)", 'confirm', () => {
                    setOrders(prev => prev.map(o => ({ ...o, deposit: 0, loadedFromCloud: false })));
                    setMatchedDeposits(new Set());
                    setIgnoredAutoMatch(new Set());
                    openModal("입금 매칭이 초기화되었습니다!\n잠시 후 순차적으로 자동 재매칭됩니다.", 'alert');
                });
            }, [openModal, setOrders, setMatchedDeposits]);

            const inventoryRef = useRef(inventory);
            const productHistoryRef = useRef(productHistory);
            useEffect(() => { inventoryRef.current = inventory; }, [inventory]);
            useEffect(() => { productHistoryRef.current = productHistory; }, [productHistory]);

            const handleQuickAddressSubmit = (addrData) => {
                if (!addrData.timestamp) addrData.timestamp = new Date().toISOString();
                setAddresses(prev => {
                    const newAddrs = [...prev];
                    if (quickAddrModal.editData) {
                        const targetNick = quickAddrModal.editData.nickname;
                        const index = newAddrs.findIndex(a => a.nickname === targetNick);
                        if (index !== -1) newAddrs[index] = { ...newAddrs[index], ...addrData };
                        else newAddrs.push(addrData);
                    } else {
                        const cleanPhone = addrData.phone ? addrData.phone.replace(/[^0-9]/g, '') : '';
                        const cleanReal = normalizeString(addrData.realname);
                        const existIdx = newAddrs.findIndex(a => {
                            const aP = a.phone ? a.phone.replace(/[^0-9]/g, '') : '';
                            return aP === cleanPhone && normalizeString(a.realname) === cleanReal && aP !== '';
                        });
                        if (existIdx !== -1) {
                            let target = { ...newAddrs[existIdx] };
                            const existNickClean = normalizeString(target.nickname);
                            const newNickClean = normalizeString(addrData.nickname);
                            if (existNickClean !== newNickClean) {
                                if (!target.linkedNicks) target.linkedNicks = [];
                                if (!target.linkedNicks.some(ln => normalizeString(ln) === newNickClean)) { target.linkedNicks = [...target.linkedNicks, addrData.nickname]; }
                            }
                            target = { ...target, ...addrData, nickname: target.nickname }; 
                            newAddrs[existIdx] = target;
                        } else {
                            newAddrs.push(addrData);
                        }
                        setAddressMapping(prevMap => ({ ...prevMap, [addrData.nickname]: addrData.nickname }));
                    }
                    return newAddrs;
                });
                setQuickAddrModal({ isOpen: false, nick: '', editData: null });
            };

            const addressLookup = useMemo(() => {
                const nickMap = {};
                addresses.forEach(a => {
                    const clean = normalizeString(a.nickname);
                    if (!nickMap[clean]) nickMap[clean] = [];
                    nickMap[clean].push(a);
                    if (a.linkedNicks && Array.isArray(a.linkedNicks)) {
                        a.linkedNicks.forEach(ln => {
                            const cleanLn = normalizeString(ln);
                            if (!nickMap[cleanLn]) nickMap[cleanLn] = [];
                            nickMap[cleanLn].push(a);
                        });
                    }
                });
                return {
                    get: (nick) => {
                        if (!nick) return { data: null, type: 'none' };
                        const mappedTarget = addressMapping[nick];
                        if (mappedTarget) {
                            const mappedAddrs = nickMap[normalizeString(mappedTarget)];
                            if (mappedAddrs && mappedAddrs.length > 0) return { data: mappedAddrs[0], type: 'mapped' };
                        }
                        const cleanNick = normalizeString(nick);
                        const matches = nickMap[cleanNick];
                        if (matches && matches.length === 1) return { data: matches[0], type: 'single' };
                        if (matches && matches.length > 1) return { data: null, type: 'multiple' };
                        return { data: null, type: 'none' };
                    }
                };
            }, [addresses, addressMapping]);

            const toggleVIP = useCallback((nick) => {
                setSpecialCustomers(prev => {
                    const next = { ...prev };
                    const nickNorm = normalizeString(nick);
                    const existingKey = Object.keys(next).find(k => normalizeString(k) === nickNorm);
                    if (existingKey && next[existingKey].type === 'vip') { delete next[existingKey]; } 
                    else { next[nick] = { type: 'vip', memo: '', purchaseCount: 0, noShowCount: 0 }; }
                    return next;
                });
            }, [setSpecialCustomers]);

            const getCalculatedShipping = useCallback((nick) => {
                if (shippingOverrides[nick] !== undefined) return Number(shippingOverrides[nick]);
                const nickNorm = normalizeString(nick);
                const specialKey = Object.keys(specialCustomers || {}).find(k => normalizeString(k) === nickNorm);
                if (specialKey && specialCustomers[specialKey].type === 'vip') return 0; 
                const addrRes = addressLookup.get(nick);
                if (addrRes && addrRes.data && addrRes.data.address && addrRes.data.address.includes('제주')) return 8000;
                return Number(quickShipping);
            }, [shippingOverrides, specialCustomers, addressLookup, quickShipping]);

            const findAddressSuggestions = useCallback((nick) => {
                if (!nick) return [];
                const cleanNick = normalizeString(nick);
                if (cleanNick.length < 2) return []; 
                const results = [];
                for (let i = 0; i < addresses.length; i++) {
                    const a = addresses[i];
                    const cleanAddrNick = normalizeString(a.nickname);
                    if (cleanAddrNick !== cleanNick && (cleanAddrNick.includes(cleanNick) || cleanNick.includes(cleanAddrNick))) {
                        results.push(a.nickname);
                        if (results.length >= 3) break; 
                    }
                }
                return results;
            }, [addresses]);

            const formatTimeOnly = useCallback((val) => { 
                if (!val) return ''; 
                const strVal = String(val);
                const dt = new Date(strVal.replace(/-/g, '/'));
                if (!isNaN(dt) && strVal.length > 8) return dt.toLocaleTimeString('ko-KR', {hour12: false, hour:'2-digit', minute:'2-digit'});

                    <div className="w-[20%] flex flex-col bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-lg overflow-hidden shadow-sm min-w-[210px]">
                        <div className="p-2 bg-slate-100 dark:bg-slate-800 border-b dark:border-slate-700 flex flex-col gap-2 shrink-0">

                                <InventoryItemRow 
                                    key={item.id} item={item} orders={orders} setOrders={setOrders} inventory={inventory} setInventory={setInventory} setProductHistory={setProductHistory} openModal={openModal} expandedInventoryItem={expandedInventoryItem} setExpandedInventoryItem={setExpandedInventoryItem} setManualProduct={setManualProduct} setCurrentSearchTerm={setCurrentSearchTerm} setManualPrice={setManualPrice} setIsFixedProductMode={setIsFixedProductMode} customerPaidStatus={customerPaidStatus}
                                />
                            ))}
                            {inventory.length === 0 && <div className="text-center text-[10px] text-slate-400 py-4">상단에서 상품을 등록해주세요.</div>}

                    </div>
                </div>
            );
        };

        const OrderManagementTab = ({ orders, shippingOverrides, quickShipping, addresses, handleExportBackup, handleImportBackup, addressMapping, cardPayments, specialCustomers, openModal }) => {
            const findAddress = (nick) => {
                if (addressMapping[nick]) return addresses.find(a => normalizeString(a.nickname) === normalizeString(addressMapping[nick]));
                return addresses.find(a => normalizeString(a.nickname) === normalizeString(nick));
            };

            const getCalculatedShipping = (nick) => {
                if (shippingOverrides && shippingOverrides[nick] !== undefined) return Number(shippingOverrides[nick]);
                const nickNorm = normalizeString(nick);
                const specialKey = Object.keys(specialCustomers || {}).find(k => normalizeString(k) === nickNorm);
                if (specialKey && specialCustomers[specialKey].type === 'vip') return 0;
                const addr = findAddress(nick);
                if (addr && addr.address && addr.address.includes('제주')) return 8000;
                return Number(quickShipping);
            };

            const handleExportProducts = () => { 
                const summary = {}; const unpaidSummary = {}; const paidSummary = {}; const customerPaidStatus = {}; const customerGroups = {};
                orders.forEach(o => { if(!customerGroups[o.customer]) customerGroups[o.customer] = []; customerGroups[o.customer].push(o); });
                const savedCardPayments = cardPayments || {};
                Object.entries(customerGroups).forEach(([nick, items]) => {
                    const activeItems = items.filter(i => !i.isCancelled); if(activeItems.length === 0) { customerPaidStatus[nick] = false; return; }
                    const isCard = savedCardPayments[nick]; 
                    const shipping = getCalculatedShipping(nick);
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0);
                    const grandTotal = productTotal + (activeItems.length > 0 ? shipping : 0); 
                    customerPaidStatus[nick] = (depositTotal >= grandTotal) || isCard;
                });
                orders.forEach(o => { 
                    if(o.isCancelled) return; 
                    const name = o.product || '(상품명 없음)'; 
                    if (!summary[name]) summary[name] = 0; if (!paidSummary[name]) paidSummary[name] = 0; if (!unpaidSummary[name]) unpaidSummary[name] = 0;
                    summary[name] += Number(o.quantity); if (customerPaidStatus[o.customer]) paidSummary[name] += Number(o.quantity); else unpaidSummary[name] += Number(o.quantity);
                }); 
                const sortedKeys = Object.keys(summary).filter(product => summary[product] > 0).sort((a, b) => a.localeCompare(b, 'ko', { numeric: true }));
                const data = sortedKeys.map(product => ({ '상품명': product, '입금완료 수량': paidSummary[product]||0, '미입금 수량': (summary[product]||0) - (paidSummary[product]||0) })); 
                downloadExcel(data, '상품별_발주리스트'); 
            };

            const handleExportCustomers = () => { 
                const groups = {}; orders.forEach(o => { if (!groups[o.customer]) groups[o.customer] = []; groups[o.customer].push(o); }); 
                let entries = Object.entries(groups).map(([nick, items]) => {
                    const activeItems = items.filter(i => !i.isCancelled); const isCard = cardPayments[nick]; 
                    const currentShipping = getCalculatedShipping(nick);
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0); 
                    const grandTotal = productTotal + (activeItems.length > 0 ? currentShipping : 0); 
                    const isPaid = (depositTotal >= grandTotal) || isCard;
                    return { nick, items: activeItems, isPaid, isCard, depositTotal, grandTotal };
                });

                const getStatusPriority = (entry) => { if (entry.isPaid && !entry.isCard) return 1; if (entry.isCard) return 2; return 3; };
                entries.sort((a, b) => { const pA = getStatusPriority(a); const pB = getStatusPriority(b); if (pA !== pB) return pA - pB; return a.nick.localeCompare(b.nick); });

                let excelRows = []; entries.forEach(({ nick, items, isPaid, isCard }) => { 
                    if(items.length === 0) return; 
                    const addrInfo = addresses.find(a => normalizeString(a.nickname) === normalizeString(nick)) || {}; 
                    const fullAddress = addrInfo.zipcode ? `(${addrInfo.zipcode}) ${addrInfo.address || ''}` : (addrInfo.address || ''); 
                    const statusColumn = isCard ? "카드결제" : (isPaid ? "" : "미입금");
                    const createRow = (productValue) => ({ '날짜시간': new Date().toLocaleString(), '공란1': '', '입금상태': statusColumn, '닉네임': nick, '주문제품(수량)': productValue, '이름': addrInfo.realname || '', '핸드폰번호': addrInfo.phone || '', '주소': fullAddress, '배송메모': addrInfo.memo || '' }); 
                    excelRows.push(createRow(`[ ${nick} ]`)); items.forEach(item => { const qtyPart = item.quantity > 1 ? ` ★${item.quantity}개` : ''; excelRows.push(createRow(`${item.product}${qtyPart}`)); }); 
                }); 
                downloadExcel(excelRows, '고객별_정산_배송리스트'); 
            };

            const handleExportUnpaid = () => {
                const groups = {}; orders.forEach(o => { if (!groups[o.customer]) groups[o.customer] = []; groups[o.customer].push(o); });
                const data = []; Object.entries(groups).forEach(([nick, items]) => {
                    if (cardPayments && cardPayments[nick]) return; 
                    const activeItems = items.filter(i => !i.isCancelled); if (activeItems.length === 0) return;
                    const currentShipping = getCalculatedShipping(nick);
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); const grandTotal = productTotal + (activeItems.length > 0 ? currentShipping : 0);
                    const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0); const balance = grandTotal - depositTotal;
                    if (balance > 0) { 
                        const depositStatus = depositTotal > 0 ? `부분입금(${depositTotal.toLocaleString()}원)` : '미입금';
                        let itemListText = activeItems.map(item => {
                            const unitPrice = item.quantity > 0 ? item.price / item.quantity : 0;
                            return `${item.product}${item.quantity > 1 ? ` (${item.quantity}개)` : ''} ${unitPrice.toLocaleString()}원`;
                        }).join('\n');
                        if (currentShipping > 0) itemListText += `\n배송비 ${currentShipping.toLocaleString()}원`;
                        
                        const { emoji, unpaidPrefix } = JSON.parse(localStorage.getItem('templateConfig') || "{}");
                        const bankStr = localStorage.getItem('bankAccount') || FIXED_BANK_ACCOUNT;
                        const msgText = `${emoji} ${nick} 님 ${emoji}\n[주문내역]\n${itemListText}\n\n총 주문금액: ${grandTotal.toLocaleString()}원\n입금확인: ${depositTotal.toLocaleString()}원\n미입금액: ${balance.toLocaleString()}원\n------------------\n${unpaidPrefix || '[미입금] 총 입금하실 금액 👉'}\n${bankStr}\n입금 부탁드립니다 🙏`;
                        
                        data.push({ '닉네임': nick, '주문내역 (상세)': itemListText, '총금액': grandTotal.toLocaleString() + '원', '입금액': depositTotal.toLocaleString() + '원', '미입금액': balance.toLocaleString() + '원', '카톡안내메시지': msgText });
                    }
                });
                if (data.length === 0) { openModal("미입금 내역이 없습니다.", "alert"); return; }
                data.sort((a, b) => String(a['닉네임'] || '').localeCompare(String(b['닉네임'] || '')));
                downloadExcel(data, '미입금자_상세리스트');
           };

           const handlePrintPackingList = () => {
               const groups = {};
               orders.forEach(o => {
                   if (o.isCancelled) return;
                   if (!groups[o.customer]) groups[o.customer] = [];
                   groups[o.customer].push(o);
               });
               if (Object.keys(groups).length === 0) { openModal("인쇄할 주문 내역이 없습니다.", "alert"); return; }
               
               let printContent = `
                   <!DOCTYPE html>
                   <html lang="ko">
                   <head>
                       <meta charset="UTF-8">
                       <title>포장리스트_인쇄</title>
                       <style>
                           @import url("https://cdn.jsdelivr.net/gh/moonspam/NanumSquareNeo/nanumsquareneo.css");
                           @page { size: 100mm 150mm; margin: 0 !important; }
                           * { box-sizing: border-box; -webkit-print-color-adjust: exact !important; print-color-adjust: exact !important; }
                           html, body { margin: 0; padding: 0; width: 100mm; background: #fff; color: #000; font-family: 'NanumSquareNeo', sans-serif; }
                           .slip { width: 100mm; padding: 8mm 4mm 4mm 4mm; page-break-after: always; position: relative; }
                           .nick { font-size: 26px; font-weight: 900; text-align: center; margin-bottom: 12px; border: 2px solid #000; padding: 8px 5px; border-radius: 8px; box-shadow: 3px 3px 0 #000; background-color: #fff; }
                           table { width: 100%; border-collapse: collapse; margin-bottom: 10px; table-layout: fixed; }
                           thead { display: table-header-group; }
                           tr { page-break-inside: avoid; page-break-after: auto; }
                           th, td { border-bottom: 1px solid #000; padding: 6px 2px; text-align: left; vertical-align: middle; }
                           th { font-size: 13px; color: #000; border-bottom: 2px solid #000; padding-bottom: 4px; }
                           .right { text-align: right; }
                           .product-name { font-weight: 800; font-size: 15px; word-break: break-all; overflow-wrap: anywhere; line-height: 1.3; padding-right: 5px; }
                           .qty { font-weight: 900; font-size: 16px; white-space: nowrap; text-align: right; width: 45px; }

                           .footer { text-align: center; font-size: 12px; font-weight: bold; border-top: 1px dashed #000; padding-top: 8px; margin-top: 15px; margin-bottom: 5px; }
                       </style>
                   </head>
                   <body>`;

               const sortedCustomers = Object.keys(groups).sort((a, b) => a.localeCompare(b, 'ko'));

               sortedCustomers.forEach(nick => {
                   const items = groups[nick];
                   items.sort((a, b) => String(b.product || '').localeCompare(String(a.product || ''), 'ko', { numeric: true }));

                   let totalQty = 0;
                   let itemsHtml = items.map(item => {
                       const q = Number(item.quantity) || 0;
                       totalQty += q;
                       return '<tr><td class="product-name">' + item.product + '</td><td class="qty right">' + q + '개</td></tr>';
                   }).join('');
                   
                   const totalItems = items.length;
                   
                   printContent += '<div class="slip"><div class="nick">' + nick + '</div><table><thead><tr><th>상품명</th><th class="right">수량</th></tr></thead><tbody>' + itemsHtml + '</tbody></table><div class="total">합계: ' + totalItems + '품목 ' + totalQty + '개</div><div class="footer">구매해 주셔서 감사합니다 ❤️</div></div>';
               });

               printContent += '<script>window.onload=function(){setTimeout(function(){window.print();},500);}</' + 'script></body></html>';
               const printWin = window.open('', '_blank', 'width=450,height=650');
               if (printWin) { printWin.document.open(); printWin.document.write(printContent); printWin.document.close(); } 
               else { openModal("팝업 차단이 설정되어 있습니다. 브라우저 설정에서 팝업을 허용해 주세요.", "alert"); }

           const fileInputRef = useRef(null);

                    keysToRemove.forEach(k => localStorage.removeItem(k));
