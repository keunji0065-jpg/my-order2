                                    }));
                                    setOrders(loadedOrders);
                                    setTimeout(() => openModal(`${loadedOrders.length}건의 주문을 성공적으로 복구했습니다!`, 'alert'), 500);
                                } else {
                                    setTimeout(() => openModal("클라우드 시트에 저장된 데이터가 없습니다.", 'alert'), 500);
                                }
                            } catch(e) {
                                setTimeout(() => openModal("불러오기 실패. 설정의 URL을 확인해주세요.", 'alert'), 500);
                            }
                        });
                    }, 1500);
                }
            }, []); 
            
            const EMOJI_LIST = ["💙", "💖", "💛", "💚", "💜", "🤍", "❤️", "⭐", "🌟", "✨", "🌸", "🌼", "🍀", "🌹", "🌻", "✅", "🎁", "📢", "🌈", "🔥", "💎", "👑", "🎀", "🍎", "🍓", "🍒", "🍑", "🍋", "🐶", "🐱", "🐰", "🐻", "🐼", "🐾", "🎈", "🎉", "🛍️", "🛒", "💰", "💸", "💳", "🧾"];

            const resetAllStatus = () => {
                openModal("주문서, 채팅, 입금매칭 내역만 초기화됩니다.\n(주소록, VIP명단, 재고, 상품단가는 유지됩니다)", 'confirm', () => {
                    setOrders([]); setCardPayments({}); setShippingOverrides({}); setMatchedDeposits(new Set()); setClickedChats(new Set()); setSentAddressRequests(new Set()); setDeletedDepositIds(new Set()); setCheckedOrders(new Set());
                    ['matchedDeposits', 'clickedChats', 'sentAddressRequests', 'deletedDepositIds', 'checkedOrders'].forEach(k => localStorage.removeItem(k));
                    openModal("방송 데이터가 초기화되었습니다.", 'alert');
                });
            };

            const handleExportBackup = () => { const backupData = { orders, productHistory, shippingOverrides, cardPayments, matchedDeposits: [...matchedDeposits], clickedChats: [...clickedChats], addressMapping, specialCustomers, inventory, templateConfig, depositorNames, keywords: [...keywords] }; downloadExcel([backupData], "kallo_backup"); };
            const handleImportBackup = (e) => { const f = e.target.files[0]; if(!f) return; const r = new FileReader(); r.onload = (evt) => { try { const d = JSON.parse(evt.target.result); if(d.orders) setOrders(d.orders); if(d.addresses) setAddresses(d.addresses); if(d.inventory) setInventory(d.inventory); if(d.specialCustomers) setSpecialCustomers(d.specialCustomers); if(d.shippingOverrides) setShippingOverrides(d.shippingOverrides); if(d.cardPayments) setCardPayments(d.cardPayments); if(d.depositorNames) setDepositorNames(d.depositorNames); if(d.addressMapping) setAddressMapping(d.addressMapping); if(d.quickMessages) setQuickMessages(d.quickMessages); if(d.templateConfig) setTemplateConfig(d.templateConfig); alert("복구 성공"); } catch(err) { alert("파일 오류"); } }; r.readAsText(f); };

            useEffect(() => {
                if (isDarkMode) document.documentElement.classList.add('dark');
                else document.documentElement.classList.remove('dark');
            }, [isDarkMode]);

            useEffect(() => { localStorage.setItem('matchedDeposits', JSON.stringify([...matchedDeposits])); }, [matchedDeposits]);
            useEffect(() => { localStorage.setItem('clickedChats', JSON.stringify([...clickedChats])); }, [clickedChats]);
            useEffect(() => { localStorage.setItem('keywords', JSON.stringify([...keywords])); }, [keywords]);
            useEffect(() => { localStorage.setItem('sentAddressRequests', JSON.stringify([...sentAddressRequests])); }, [sentAddressRequests]);
            useEffect(() => { localStorage.setItem('deletedDepositIds', JSON.stringify([...deletedDepositIds])); }, [deletedDepositIds]);
            useEffect(() => { localStorage.setItem('checkedOrders', JSON.stringify([...checkedOrders])); }, [checkedOrders]);

            return (
                <div className="flex flex-col h-screen overflow-hidden text-slate-700 dark:text-slate-200">
                    <header className="h-12 bg-indigo-900 dark:bg-slate-950 text-white flex items-center justify-between px-4 shrink-0 shadow-md z-50">
                        <div className="font-bold text-lg flex items-center gap-2 transition-transform hover:scale-105 duration-200 cursor-pointer"><Icon name="lightning" className="text-yellow-400" weight="fill"/> 깔로 주문서 PRO</div>
                        <div className="flex items-center gap-2">
                            <div className="flex bg-indigo-800 dark:bg-slate-900 rounded p-1 gap-1">
                                {[{ id: 'live', label: '라이브관제', icon: 'monitor-play' }, { id: 'status', label: '재고/발주', icon: 'clipboard-text' }, { id: 'customer', label: '고객관리', icon: 'address-book' }, { id: 'cs', label: 'CS관리', icon: 'headset' }, { id: 'manage', label: '주문관리', icon: 'file-xls' }].map(tab => (
                                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`px-3 py-1.5 rounded text-sm font-bold flex items-center gap-1 transition-all ${activeTab === tab.id ? 'bg-white dark:bg-slate-700 text-indigo-900 dark:text-white shadow' : 'text-indigo-300 dark:text-slate-400 hover:text-white'}`}><Icon name={tab.icon} weight="bold"/> {tab.label}</button>
                                ))}
                            </div>
                            <button onClick={()=>setIsDarkMode(!isDarkMode)} className="p-2 hover:bg-indigo-800 dark:bg-slate-800 rounded transition-colors duration-200" title={isDarkMode ? '라이트모드' : '다크모드'}><Icon name={isDarkMode ? 'sun' : 'moon'} weight="fill" size={20}/></button>
                            <button onClick={()=>setIsSettingsOpen(!isSettingsOpen)} className="p-2 hover:bg-indigo-800 dark:bg-slate-800 rounded transition-colors duration-200" title="환경설정"><Icon name="gear" weight="fill" size={20}/></button>
                        </div>
                    </header>
                    <Modal isOpen={modalConfig.isOpen} type={modalConfig.type} message={modalConfig.message} onConfirm={modalConfig.onConfirm} onCancel={modalConfig.onCancel} initialValue={modalConfig.initialValue} />
                    {isSettingsOpen && (
                        <div className="absolute top-12 right-4 bg-white dark:bg-slate-800 shadow-xl border dark:border-slate-700 rounded-lg p-4 w-[420px] z-50 animate-pop max-h-[85vh] overflow-y-auto">
                            <h3 className="font-bold mb-4 flex items-center gap-2 border-b dark:border-slate-700 pb-2"><Icon name="gear" weight="fill" className="text-gray-500"/> 환경설정</h3>
                            <div className="mb-4 space-y-4">
                                <div><label className="block text-xs font-bold text-indigo-600 dark:text-indigo-400 mb-1">구글 앱스 스크립트 URL</label><input type="text" value={googleScriptUrl} onChange={(e)=>setGoogleScriptUrl(e.target.value)} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs text-gray-600 dark:text-slate-400 font-mono break-all bg-transparent" /></div>
                                <div><label className="block text-xs font-bold text-green-600 dark:text-green-400 mb-1">고객 주소록 시트 ID</label><input type="text" value={customerSheetId} onChange={(e)=>setCustomerSheetId(e.target.value)} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs text-gray-600 dark:text-slate-400 font-mono bg-transparent" /></div>
                                <div><label className="block text-xs font-bold text-gray-500 dark:text-slate-400 mb-1">기본 배송비</label><input type="number" value={quickShipping} onChange={(e)=>setQuickShipping(Number(e.target.value))} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100" /></div>
                                <div className="border-t dark:border-slate-700 pt-4"><h4 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-2 flex items-center gap-1"><Icon name="chat-text" weight="fill"/> 주문서 멘트 설정</h4>
                                    <div className="space-y-3">
                                        <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">닉네임 이모지 (클릭하여 선택)</label><input type="text" value={templateConfig.emoji} onChange={(e)=>setTemplateConfig({...templateConfig, emoji: e.target.value})} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100 mb-2" />
                                        <div className="flex flex-wrap gap-1 bg-slate-50 dark:bg-slate-900 p-2 rounded border border-slate-100 dark:border-slate-700 max-h-32 overflow-y-auto scrollbar-thin">
                                            {EMOJI_LIST.map(em => (<button type="button" key={em} onClick={() => setTemplateConfig({...templateConfig, emoji: em})} className="w-7 h-7 flex items-center justify-center hover:bg-white dark:hover:bg-slate-700 rounded hover:shadow-sm transition-all text-base">{em}</button>))}
                                        </div>
                                        </div>
                                        <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">완납 메시지</label><input type="text" value={templateConfig.paidMsg} onChange={(e)=>setTemplateConfig({...templateConfig, paidMsg: e.target.value})} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100" /></div>
                                        <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">미납 안내</label><textarea value={templateConfig.unpaidPrefix} onChange={(e)=>setTemplateConfig({...templateConfig, unpaidPrefix: e.target.value})} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-16 resize-none bg-transparent dark:text-slate-100" /></div>
                                        <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">계좌번호</label><textarea value={bankAccount} onChange={(e)=>setBankAccount(e.target.value)} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-12 resize-none bg-transparent dark:text-slate-100" /></div>
                                        <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">주소 있음 안내</label><textarea value={templateConfig.addrNotice} onChange={(e)=>setTemplateConfig({...templateConfig, addrNotice: e.target.value})} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-12 resize-none bg-transparent dark:text-slate-100" /></div>
                                        <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">주소 없음 안내</label><textarea value={templateConfig.surveyNotice} onChange={(e)=>setTemplateConfig({...templateConfig, surveyNotice: e.target.value})} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs h-24 resize-none bg-transparent dark:text-slate-100" /></div>
                                        <div className="flex items-center justify-between bg-indigo-50 dark:bg-indigo-900/20 p-2 rounded border border-indigo-100 dark:border-indigo-800">
                                            <label className="text-xs font-bold text-indigo-700 dark:text-indigo-300 cursor-pointer" onClick={() => setTemplateConfig({...templateConfig, alwaysRequestAddress: !templateConfig.alwaysRequestAddress})}>주소록 무시하고 항상 새로 입력받기 (강제수집)</label>
                                            <input type="checkbox" checked={templateConfig.alwaysRequestAddress || false} onChange={(e)=>setTemplateConfig({...templateConfig, alwaysRequestAddress: e.target.checked})} className="custom-checkbox" />
                                        </div>
                                    </div>
                                </div>
                                <div className="border-t dark:border-slate-700 pt-4">
                                    <h4 className="text-sm font-bold text-slate-800 dark:text-slate-200 mb-2 flex items-center gap-1"><Icon name="lightning" weight="fill" className="text-yellow-500"/> 빠른 댓글 복사 (대시보드용)</h4>
                                    <div className="space-y-2">
                                        {quickMessages.map((msg, idx) => (
                                            <input 
                                                key={idx}
                                                type="text" 
                                                value={msg} 
                                                onChange={(e) => {
                                                    const newMsgs = [...quickMessages];
                                                    newMsgs[idx] = e.target.value;
                                                    setQuickMessages(newMsgs);
                                                }}
                                                placeholder={`빠른 댓글 ${idx + 1}`}
                                                className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs bg-transparent dark:text-slate-100" 
                                            />
                                        ))}
                                    </div>
                                </div>
                            </div>
                            <button onClick={()=>setIsSettingsOpen(false)} className="w-full bg-indigo-600 text-white rounded py-2 text-sm font-bold hover:bg-indigo-700 transition-colors">저장 및 닫기</button>
                        </div>
                    )}
                    <main className="flex-1 overflow-hidden bg-gray-200 dark:bg-slate-950 p-2 relative">
                        {activeTab === 'live' && <LiveTab {...{ orders, setOrders, productHistory, setProductHistory, quickShipping, shippingOverrides, setShippingOverrides, bankAccount, googleScriptUrl, addresses, setAddresses, cardPayments, setCardPayments, resetAllStatus, matchedDeposits, setMatchedDeposits, depositorNames, setDepositorNames, clickedChats, setClickedChats, openModal, keywords, setKeywords, sentAddressRequests, setSentAddressRequests, deletedDepositIds, setDeletedDepositIds, checkedOrders, setCheckedOrders, addressMapping, setAddressMapping, templateConfig, specialCustomers, inventory, setInventory, quickMessages, customerSheetId }} />}
                        {activeTab === 'status' && <OrderStatusTab {...{ orders, setOrders, setProductHistory, productHistory, inventory, setInventory, openModal, shippingOverrides, quickShipping, addresses, addressMapping, cardPayments, specialCustomers }} />}
                        {activeTab === 'customer' && <CustomerTab {...{ addresses, setAddresses, googleScriptUrl, customerSheetId, openModal, specialCustomers, setSpecialCustomers, orders, addressMapping }} />}
                        {activeTab === 'cs' && <CSTab {...{ csData, setCsData, openModal }} />}
                        {activeTab === 'manage' && <OrderManagementTab {...{ orders, shippingOverrides, quickShipping, addresses, handleExportBackup, handleImportBackup, addressMapping, cardPayments, specialCustomers }} />}
                    </main>
                </div>
            );
        }
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
