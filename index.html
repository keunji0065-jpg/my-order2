                        const existIdx = prev.findIndex(o => o.customer === cNick && o.product === cContent && !o.isCancelled);
                        if (existIdx !== -1) { 
                            const next = [...prev]; 
                            next[existIdx] = { ...next[existIdx], quantity: next[existIdx].quantity + qty, price: (next[existIdx].quantity + qty) * price }; 
                            return next; 
                        }
                    }
                    if (afterId) {
                        const idx = prev.findIndex(o => o.id === afterId);
                        if (idx !== -1) { const next = [...prev]; next.splice(idx + 1, 0, newOrder); return next; }
                    }
                    return [newOrder, ...prev];
                });
            }, [setCheckedOrders, setOrders]);

            const handleLoadOrders = async () => {
                openModal("불러오시겠습니까?", 'confirm', async () => {
                    if (!googleScriptUrl) return;
                    try {
                        const actualSheetId = getCleanSheetId(customerSheetId);
                        const res = await fetch(`${googleScriptUrl}?action=get_orders&t=${Date.now()}&sheet_id=${actualSheetId}`);
                        const data = await res.json();
                        if (data.error) { openModal(`서버 거부: ${data.error}\n환경설정에서 시트 ID를 다시 확인해주세요.`, 'alert'); return; }
                        if (data && data.orders) {
                            if (data.orders.length === 0) { openModal("클라우드 시트에 저장된 주문 데이터가 없습니다.", 'alert'); return; }
                            const parseNum = (val) => { if (!val) return 0; const n = Number(String(val).replace(/,/g, '')); return isNaN(n) ? 0 : n; };
                            const loadedOrders = data.orders.map((o, idx) => ({
                                id: Date.now() + idx,
                                customer: o.nickname || o.customer || o['닉네임'] || o['주문자'] || '',
                                product: o.product || o['상품명'] || o['상품'] || '',
                                quantity: parseNum(o.qty || o.quantity || o['수량']) || 1,
                                price: parseNum(o.price || o['가격'] || o['단가'] || o['금액']),
                                deposit: parseNum(o.deposit || o['입금액'] || o['입금']),
                                isCancelled: false,
                                isUnmodified: true
                            }));
                            setOrders(loadedOrders);
                            openModal("로드 완료", 'alert');
                        }
                    } catch(e) { openModal("로드 실패", 'alert'); }
                });
            };

            const handleManualSubmit = (e) => { e.preventDefault(); if(!manualNick.trim()) return openModal("닉네임을 입력해주세요.", 'alert'); addOrderLogic(manualNick, manualProduct, 1); setManualNick(''); setManualProduct(''); };

            const handleDepositClick = (dep) => {
                const targetNick = orders.find(o => !o.isCancelled && cleanForMatch(o.customer) === cleanForMatch(dep.name))?.customer || selectedNick;
                if (!targetNick) return openModal("주문자를 먼저 선택해주세요.", "alert");
                setOrders(prev => {
                    let done = false;
                    return prev.map(o => {
                        if (!done && o.customer === targetNick) { done = true; return { ...o, deposit: (o.deposit || 0) + Number(dep.amount) }; }
                        return o;
                    });
                });
                setMatchedDeposits(p => new Set(p).add(dep.id));
            };

            const handleAddKeyword = (e) => { e.preventDefault(); if(!keywordInput.trim()) return; setKeywords(prev => new Set(prev).add(keywordInput.trim())); setKeywordInput(''); };
            const handleRemoveKeyword = (keyword) => { setKeywords(prev => { const next = new Set(prev); next.delete(keyword); return next; }); };
            
            const handleCopyDepositName = (e, name, id) => {
                e.stopPropagation(); 
                const textArea = document.createElement("textarea"); textArea.value = name; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); setDepositCopyStatus(prev => ({ ...prev, [id]: true })); setTimeout(() => { setDepositCopyStatus(prev => ({ ...prev, [id]: false })); }, 2000); } catch (err) { openModal('복사 실패', 'alert'); } document.body.removeChild(textArea);
            };

            const handleCopyQuickMessage = (msg, idx) => {
                if (!msg || !msg.trim()) return;
                const textArea = document.createElement("textarea"); textArea.value = msg; document.body.appendChild(textArea); textArea.select();
                try { document.execCommand('copy'); setQuickMsgCopyStatus(p => ({ ...p, [idx]: true })); setTimeout(() => setQuickMsgCopyStatus(p => ({ ...p, [idx]: false })), 1500); } catch (err) {} document.body.removeChild(textArea);
            };

            const handleDeleteDepositItem = (id) => { openModal("숨기시겠습니까?", 'confirm', () => { setManualDeposits(prev => prev.filter(d => d.id !== id)); setDeletedDepositIds(prev => new Set(prev).add(id)); setMatchedDeposits(prev => { const next = new Set(prev); next.delete(id); return next; }); }); };

            const handleChatClick = (chat) => { setClickedChats(prev => new Set(prev).add(chat.id)); addOrderLogic(chat.nickname, String(chat.content || ''), 1, true); };
            const handleAddManualDeposit = (e) => { e.preventDefault(); if (!newDepositName.trim() || !newDepositAmount) return openModal("입금자명/금액 필수", 'alert'); const newDep = { id: `manual_${Date.now()}`, name: newDepositName, amount: newDepositAmount, source: 'manual' }; setManualDeposits(prev => [newDep, ...prev]); setNewDepositName(''); setNewDepositAmount(''); };

            return (
                <div className="flex h-full gap-2 p-2 overflow-hidden bg-gray-100 dark:bg-slate-900 text-slate-800 dark:text-slate-100">
                    <datalist id="product-list">{Array.isArray(inventory) && inventory.map(i => <option key={i.id} value={i.name} />)}</datalist>
                    
                    <QuickAddressModal isOpen={quickAddrModal.isOpen} nick={quickAddrModal.nick} onClose={() => setQuickAddrModal({ isOpen: false, nick: '' })} onSubmit={handleQuickAddressSubmit} />

                    <div className="w-[30%] flex flex-col bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-lg shadow-sm overflow-hidden">
                        <div className="p-1.5 bg-blue-50 dark:bg-blue-900/20 border-b dark:border-slate-700 grid grid-cols-4 gap-1">
                            {quickMessages.map((msg, idx) => (
                                <button key={idx} onClick={() => handleCopyQuickMessage(msg, idx)} className={`text-[10px] border rounded py-1 truncate transition-colors shadow-sm ${quickMsgCopyStatus[idx] ? 'bg-green-500 text-white font-bold' : 'bg-white dark:bg-slate-800 text-blue-700 dark:text-blue-300'}`}>{quickMsgCopyStatus[idx] ? '✅ 복사완료' : (msg || "빈 메시지")}</button>
                            ))}
                        </div>
                        <div className="p-2 bg-indigo-50 dark:bg-slate-700/50 border-b dark:border-slate-700 flex flex-col gap-2">
                             <div className="font-bold text-indigo-700 dark:text-indigo-300 flex items-center justify-between"><div className="flex items-center gap-2"><span className="flex items-center gap-1"><Icon name="youtube-logo" weight="fill" className="text-red-600"/> 라이브 댓글</span><button onClick={() => setShowKeywordOnly(!showKeywordOnly)} className={`flex items-center justify-center w-6 h-6 rounded-full transition-all ${showKeywordOnly ? 'bg-blue-600 text-white shadow-sm' : 'bg-white dark:bg-slate-600 text-gray-400 dark:text-slate-300 border border-gray-200 dark:border-slate-500 hover:text-blue-500'}`}><Icon name="target" weight={showKeywordOnly ? "fill" : "bold"} size={14} /></button></div><span className="text-xs text-gray-500 dark:text-slate-400">{filteredChats.length}건</span></div>
                             <div className="flex gap-2">
                                 <div className="relative flex-1"><Icon name="magnifying-glass" className="absolute left-1.5 top-1/2 -translate-y-1/2 text-gray-400 text-[10px]"/><input type="text" placeholder="검색" value={chatSearch} onChange={e => setChatSearch(e.target.value)} className="w-full text-[10px] pl-5 py-1.5 border dark:border-slate-600 rounded outline-none bg-white dark:bg-slate-800 focus:ring-1 focus:ring-indigo-400" /></div>
                                 <form onSubmit={handleAddKeyword} className="flex gap-1 w-[45%]">
                                     <input type="text" value={keywordInput} onChange={(e) => setKeywordInput(e.target.value)} placeholder="키워드" className="w-full text-[10px] border dark:border-slate-600 rounded px-1.5 py-1.5 bg-white dark:bg-slate-800 outline-none focus:ring-1 focus:ring-indigo-400" />
                                     <button type="submit" className="bg-blue-500 hover:bg-blue-600 text-white px-1.5 rounded text-[10px] font-bold transition-colors">＋</button>
                                     {keywords.size > 0 && <button type="button" onClick={() => openModal('키워드를 모두 삭제하시겠습니까?', 'confirm', () => setKeywords(new Set()))} className="bg-red-500 hover:bg-red-600 text-white px-1.5 rounded text-[10px] font-bold whitespace-nowrap transition-colors shadow-sm">비우기</button>}
                                 </form>
                             </div>
                             {keywords.size > 0 && (<div className="flex gap-1 overflow-x-auto scrollbar-hide py-0.5">{Array.from(keywords).map(k => (<span key={k} onClick={() => handleRemoveKeyword(k)} className="bg-blue-100 dark:bg-blue-900/40 text-blue-700 dark:text-blue-300 px-1.5 py-0.5 rounded-full text-[10px] cursor-pointer whitespace-nowrap hover:bg-red-100 hover:text-red-600 transition-colors flex items-center gap-0.5">{k} <Icon name="x" weight="bold" size={8}/></span>))}</div>)}
                        </div>
                        <div className="flex-1 overflow-y-auto p-1.5 space-y-0.5 bg-gray-100 dark:bg-slate-900">
                            {filteredChats.map(c => {
                                const safeContent = String(c.content || '');
                                const isMatched = Array.from(keywords).some(k => safeContent.includes(k));
                                const isProcessed = clickedChats?.has(c.id);
                                const chatClasses = isProcessed ? 'opacity-80 bg-gray-100 dark:bg-slate-800/80 border-transparent' : (isMatched ? 'bg-blue-50 dark:bg-blue-900/20 border-blue-300 dark:border-blue-700 ring-1 ring-blue-300 dark:ring-blue-700 shadow-sm' : 'bg-white dark:bg-slate-800 border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700');
                                return (
                                    <div key={c.id} onClick={() => handleChatClick(c)} className={`py-1 px-1.5 border rounded cursor-pointer transition-all flex flex-col gap-0.5 ${chatClasses}`}>
                                        <div className="flex justify-between text-xs font-bold"><span>{c.nickname} {renderSpecialBadge(c.nickname)}</span><span className="text-[10px] text-gray-400">{formatTimeOnly(c.time)}</span></div>
                                        <div className={`text-sm leading-tight ${isProcessed ? 'text-gray-500 dark:text-slate-400' : 'dark:text-slate-300'}`}>{renderChatContent(safeContent, keywords)}</div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    <div className="w-[20%] flex flex-col bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-lg overflow-hidden shadow-sm">
                        <div className="p-2 bg-yellow-50 dark:bg-slate-700/50 border-b dark:border-slate-700 flex flex-col gap-2">
                            <div className="font-bold text-yellow-700 dark:text-yellow-300 flex items-center justify-between"><span className="flex items-center gap-1"><Icon name="money" weight="fill"/> 입금 내역</span><span className="text-xs text-gray-500 dark:text-slate-400">{filteredDeposits.length}건</span></div>
                            <form onSubmit={handleAddManualDeposit} className="flex flex-col gap-1 bg-white dark:bg-slate-800 p-1 rounded border border-yellow-200 dark:border-slate-600">
                                <div className="flex gap-1"><input type="text" value={newDepositName} onChange={(e)=>setNewDepositName(e.target.value)} placeholder="입금자명" className="w-[60%] text-xs border dark:border-slate-600 rounded px-1 py-1.5 bg-transparent outline-none focus:ring-1 focus:ring-yellow-400" /><input type="text" value={newDepositAmount ? Number(newDepositAmount).toLocaleString() : ''} onChange={(e)=>{ const val = e.target.value.replace(/,/g, ''); if(!isNaN(val)) setNewDepositAmount(val); }} placeholder="금액" className="w-[40%] text-xs border dark:border-slate-600 rounded px-1 py-1.5 bg-transparent text-right font-bold outline-none focus:ring-1 focus:ring-yellow-400" /></div>
                                <button type="submit" className="bg-yellow-500 text-white text-xs font-bold py-1.5 rounded hover:bg-yellow-600 transition-colors shadow-sm">수동 입금 추가</button>
                            </form>
                            <div className="relative"><Icon name="magnifying-glass" className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-400"/><input type="text" placeholder="입금자/금액 검색" value={depositSearch} onChange={e => setDepositSearch(e.target.value)} className="w-full text-xs pl-7 pr-6 py-1.5 border dark:border-slate-600 rounded focus:ring-1 focus:ring-yellow-500 outline-none bg-white dark:bg-slate-800" />{depositSearch && <button onClick={()=>setDepositSearch('')} className="absolute right-2 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600 dark:hover:text-slate-200"><Icon name="x-circle" weight="fill" size={14}/></button>}</div>
                            {selectedNick && <div className="text-[11px] text-blue-600 dark:text-blue-300 bg-blue-50 dark:bg-blue-900/30 p-1 rounded text-center font-bold animate-pulse border border-blue-200 dark:border-blue-800">👇 '{selectedNick}' 님께 매칭 대기 중</div>}
                        </div>
                        <div className="flex-1 overflow-y-auto p-1.5 space-y-1 bg-gray-100 dark:bg-slate-900">
                            {filteredDeposits.map(d => {
                                const isUsed = matchedDeposits?.has(d.id);
                                return (
                                    <div key={d.id} onClick={() => handleDepositClick(d)} className={`relative flex items-center justify-between py-1.5 px-2 border rounded cursor-pointer transition-all group ${isUsed ? 'opacity-50 bg-gray-200 dark:bg-slate-800 line-through border-transparent' : 'bg-white dark:bg-slate-800 border-gray-200 dark:border-slate-700 hover:bg-gray-50 dark:hover:bg-slate-700 shadow-sm'}`}>
                                        <div className="flex items-center gap-1 overflow-hidden">
                                            <span className={`text-sm truncate ${isUsed ? 'text-gray-500 dark:text-slate-400' : 'text-gray-900 dark:text-slate-100 font-bold'}`}>{d.name}</span>
                                            <button onClick={(e) => handleCopyDepositName(e, d.name, d.id)} className={`shrink-0 transition-colors ${depositCopyStatus[d.id] ? 'text-green-500' : 'text-gray-400 hover:text-indigo-600 dark:hover:text-indigo-400'}`} title="이름 복사"><Icon name={depositCopyStatus[d.id] ? "check" : "copy"} weight="bold" size={14}/></button>
                                            {d.source === 'manual' && <span className="text-[9px] text-gray-400 dark:text-slate-500 bg-gray-100 dark:bg-slate-700 px-1 rounded shrink-0">수동</span>}
                                        </div>
                                        <div className="flex items-center gap-2 shrink-0">
                                            <span className="text-[10px] text-gray-500 dark:text-slate-400">{formatTimeOnly(d.time || d.date)}</span>
                                            <div className="flex flex-col items-end justify-center">
                                                <span className={`font-bold text-sm ${isUsed ? 'text-gray-500 dark:text-slate-400' : 'text-blue-600 dark:text-blue-400'}`}>+{Number(d.amount).toLocaleString()}</span>
                                                {isUsed && <span className="text-[9px] font-bold text-green-600 dark:text-green-400 bg-green-100 dark:bg-green-900/30 px-1 py-0.5 rounded mt-0.5">매칭완료</span>}
                                            </div>
                                        </div>
                                        <button onClick={(e)=>{e.stopPropagation(); handleDeleteDepositItem(d.id);}} className="absolute -right-1 -top-1 bg-red-500 text-white rounded-full p-0.5 opacity-0 group-hover:opacity-100 transition-opacity shadow-sm"><Icon name="trash" size={10} weight="bold"/></button>
                                    </div>
                                );
                            })}
                        </div>
                        <div className="p-2 bg-white dark:bg-slate-800 text-center font-bold text-xs border-t dark:border-slate-700 shadow-[0_-2px_10px_rgba(0,0,0,0.05)]">총: <span className="text-green-600 dark:text-green-400 text-sm">{totalDepositAmount.toLocaleString()}</span>원</div>
                    </div>

                    <div className="w-[50%] bg-white dark:bg-slate-800 border dark:border-slate-700 rounded-lg flex flex-col overflow-hidden shadow-sm">
                        <div className="grid grid-cols-5 gap-1 p-2 bg-indigo-50 dark:bg-slate-700/50 border-b dark:border-slate-700 text-center text-[10px]">
                            {[{id:'all', label:'총매출', val:dashboardStats.totalSales}, {id:'paid', label:'입금액', val:dashboardStats.totalDeposit}, {id:'unpaid', label:'미수금', val:dashboardStats.totalUnpaid}, {id:'card', label:'카드예정', val:dashboardStats.totalCardExpected}, {id:'no-address', label:'주소미입력', val:dashboardStats.missingAddressCount, onClick:handleNoAddressClick}].map(s => (
                                <div key={s.id} onClick={s.onClick || (()=>setFilterStatus(s.id))} className={`bg-white dark:bg-slate-800 p-1 rounded border-2 cursor-pointer shadow-sm transition-colors ${filterStatus===s.id ? 'border-indigo-500' : 'border-transparent hover:border-indigo-200 dark:hover:border-indigo-800'}`}><div>{s.label}</div><div className={`font-bold text-sm ${s.id==='paid'?'text-green-600':s.id==='unpaid'?'text-red-500':s.id==='card'?'text-purple-600':s.id==='no-address'?'text-orange-500':'text-indigo-700 dark:text-indigo-400'}`}>{s.val.toLocaleString()}{s.id==='no-address'?'명':''}</div></div>
                            ))}
                        </div>
                        <div className="p-2 flex flex-col gap-2 bg-white dark:bg-slate-800 border-b dark:border-slate-700 z-20 shadow-sm">
                            <div className="flex justify-between items-center">
                                <span className="text-sm font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-1">
                                    <Icon name="package" weight="fill"/> 주문서 <span className="text-xs font-normal text-gray-500">({filteredGroupedOrders.length}명 / {totalItemsCount}건)</span>
                                </span>
                                <div className="flex items-center gap-2">
                                    <button onClick={handleLoadOrders} className="bg-blue-500 hover:bg-blue-600 text-white px-2 py-1 rounded text-xs font-bold flex items-center gap-1 shadow-sm transition-colors"><Icon name="cloud-arrow-down" weight="fill"/> 불러오기</button>
                                    <button onClick={resetAllStatus} className="bg-rose-500 hover:bg-rose-600 text-white px-2 py-1 rounded text-xs font-bold flex items-center gap-1 shadow-sm transition-colors"><Icon name="trash" weight="fill"/> 초기화</button>
                                    <div className={`px-2 py-1 rounded text-xs font-bold flex items-center gap-1 shadow-inner ${isSaving ? 'bg-indigo-100 dark:bg-indigo-900/30 text-indigo-700 dark:text-indigo-400' : 'bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400'}`}>
                                        {isSaving ? <Icon name="spinner" className="animate-spin" /> : <Icon name="cloud-check" weight="fill" />} {isSaving ? "저장중" : "자동저장"}
                                    </div>
                                </div>
                            </div>
                            <div className="flex gap-2 items-stretch w-full">
                                <form onSubmit={(e)=>{e.preventDefault(); if(!manualNick.trim()) return openModal("닉네임을 입력해주세요.", 'alert'); addOrderLogic(manualNick, manualProduct, 1); setManualNick(''); setManualProduct('');}} className="w-[70%] flex gap-1.5 items-center bg-indigo-50 dark:bg-slate-700/50 p-1.5 rounded border border-indigo-100 dark:border-slate-600 shadow-sm min-w-[320px]">
                                    <span className="text-xs font-bold text-indigo-600 dark:text-indigo-400 whitespace-nowrap pl-1 shrink-0">🖐️ 수동입력</span>
                                    <div className="relative w-20 sm:w-28 shrink-0">
                                        <input type="text" placeholder="닉네임" value={manualNick} onChange={e => {setManualNick(e.target.value); setShowNickSuggestions(true);}} onFocus={()=>setShowNickSuggestions(true)} onBlur={()=>setTimeout(()=>setShowNickSuggestions(false), 200)} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-xs font-bold outline-none focus:ring-1 focus:ring-indigo-400 bg-white dark:bg-slate-800 dark:text-white" />
                                        {showNickSuggestions && nicknameSuggestions.length > 0 && (<div className="absolute top-full left-0 mt-1 w-full min-w-[200px] bg-white dark:bg-slate-800 border dark:border-slate-600 rounded shadow-xl z-50 overflow-hidden">{nicknameSuggestions.map((s, i) => (<div key={i} onClick={()=>{setManualNick(s.nick); setShowNickSuggestions(false); document.getElementById('manual-prod-input')?.focus();}} className="px-2 py-1.5 text-xs hover:bg-indigo-50 dark:hover:bg-slate-700 cursor-pointer border-b border-gray-50 dark:border-slate-700/50 last:border-0 flex flex-col"><span className="font-bold">{s.nick}</span>{s.realName && <span className="text-[10px] text-gray-500">👤 {s.realName}</span>}</div>))}</div>)}
                                    </div>
                                    <input id="manual-prod-input" type="text" list="product-list" placeholder="상품명" value={manualProduct} onChange={e => {setManualProduct(e.target.value); setCurrentSearchTerm(e.target.value);}} className="flex-1 min-w-0 border dark:border-slate-600 rounded px-2 py-1.5 text-xs outline-none focus:ring-1 focus:ring-indigo-400 bg-white dark:bg-slate-800 dark:text-white" />
                                    <button type="submit" className="bg-indigo-600 hover:bg-indigo-700 transition-colors text-white px-3 py-1.5 rounded text-xs font-bold shadow-sm shrink-0 whitespace-nowrap">＋ 추가</button>
                                </form>
                                <div className="w-[30%] relative h-full flex items-center min-w-[120px]">
                                    <Icon name="magnifying-glass" className="absolute left-2.5 top-1/2 -translate-y-1/2 text-gray-400"/>
                                    <input type="text" placeholder="초성/이름 검색" value={orderSearch} onChange={e => setOrderSearch(e.target.value)} className="w-full h-full pl-8 pr-2 py-1.5 border dark:border-slate-600 rounded text-xs outline-none focus:ring-1 focus:ring-indigo-400 bg-gray-50 dark:bg-slate-800 dark:text-white shadow-sm" />
                                </div>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-1.5 bg-gray-100 dark:bg-slate-900 relative z-0">
                            {filteredGroupedOrders.map(([nick, items]) => {
                                const ship = getCalculatedShipping(nick);
                                const activeItems = items.filter(i => !i.isCancelled);
                                const prodSum = activeItems.reduce((s, i) => s + Number(i.price), 0);
                                const depSum = items.reduce((s, i) => s + (i.deposit || 0), 0);
                                const grand = prodSum + (activeItems.length > 0 ? ship : 0);
                                const bal = grand - depSum;
                                
                                return (<CustomerBlock key={nick} nick={nick} items={items} isSelected={selectedNick === nick} currentShipping={ship} isCard={cardPayments[nick]} isPaidState={bal <= 0 && activeItems.length > 0} grandTotal={grand} depositTotal={depSum} balance={bal} addr={findAddress(nick)?.data} addrType={findAddress(nick)?.type} addressMapping={addressMapping} suggestions={findAddressSuggestions(nick)} autoDepositorName={findAddress(nick)?.data?.realname || ''} displayDepositorName={depositorNames[nick] || findAddress(nick)?.data?.realname || '입금자'} isAutoDepositor={!depositorNames[nick] && findAddress(nick)?.data?.realname} depositorNames={depositorNames} copyStatus={copyStatus} isOrderConfirmed={checkedOrders.has(nick)} isEditingShipping={editingShippingNick === nick} stockLookup={stockLookup} setSelectedNick={setSelectedNick} addOrderLogic={addOrderLogic} handleNicknameEdit={handleNicknameEdit} toggleCardPayment={toggleCardPayment} handleShippingChange={handleShippingChange} setEditingShippingNick={setEditingShippingNick} openModal={openModal} setDepositorNames={setDepositorNames} handleFullDepositToggle={handleFullDepositToggle} copyOrderSheet={copyOrderSheet} handleOrderCheckToggle={handleOrderCheckToggle} handleAddressUnmapping={handleAddressUnmapping} handleAddressMapping={handleAddressMapping} handleProductChange={handleProductChange} handleQuantityUpdate={handleQuantityUpdate} handleOrderCancel={handleOrderCancel} handleOrderDelete={handleOrderDelete} renderSpecialBadge={renderSpecialBadge} onOpenQuickAddress={(nick) => setQuickAddrModal({ isOpen: true, nick })} />);
                            })}
                        </div>
                    </div>
                </div>
            );
        };

        const OrderStatusTab = ({ orders, inventory, setInventory, downloadExcel, openModal, setProductHistory, addresses, addressMapping, shippingOverrides, specialCustomers, quickShipping, cardPayments }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [lastAddedId, setLastAddedId] = useState(null);
            const [isOptionModalOpen, setIsOptionModalOpen] = useState(false);
            const [optBaseName, setOptBaseName] = useState('');
            const [opt1, setOpt1] = useState('');
            const [opt2, setOpt2] = useState('');
            const [optPrice, setOptPrice] = useState('');

            const findAddress = useCallback((nick) => {
                if (addressMapping[nick]) {
                    const mappedAddr = addresses.find(a => normalizeString(a.nickname) === normalizeString(addressMapping[nick]));
                    if (mappedAddr) return { data: mappedAddr, type: 'mapped' };
                }
                const cleanNick = normalizeString(nick);
                const matches = addresses.filter(a => normalizeString(a.nickname) === cleanNick);
                if (matches.length === 1) return { data: matches[0], type: 'single' };
                return { data: null, type: 'none' };
            }, [addresses, addressMapping]);

            const getCalculatedShipping = useCallback((nick) => {
                if (shippingOverrides[nick] !== undefined) return Number(shippingOverrides[nick]);
                const nickNorm = normalizeString(nick);
                const specialKey = Object.keys(specialCustomers || {}).find(k => normalizeString(k) === nickNorm && specialCustomers[k].type === 'vip');
                if (specialKey) return 0;
                const addrRes = findAddress(nick);
                if (addrRes && addrRes.data && addrRes.data.address && addrRes.data.address.includes('제주')) return 8000;
                return Number(quickShipping);
            }, [shippingOverrides, specialCustomers, findAddress, quickShipping]);

            const customerPaidStatus = useMemo(() => {
                const status = {};
                const groups = {};
                orders.forEach(o => { if(!groups[o.customer]) groups[o.customer] = []; groups[o.customer].push(o); });
                const savedCardPayments = cardPayments || {};
                Object.entries(groups).forEach(([nick, items]) => {
                    const activeItems = items.filter(i => !i.isCancelled); 
                    if(activeItems.length === 0) { status[nick] = false; return; }
                    const isCard = savedCardPayments[nick]; 
                    const shipping = getCalculatedShipping(nick);
                    const productTotal = activeItems.reduce((sum, i) => sum + Number(i.price), 0); 
                    const depositTotal = items.reduce((sum, i) => sum + (i.deposit || 0), 0);
                    const grandTotal = productTotal + (activeItems.length > 0 ? shipping : 0); 
                    status[nick] = (depositTotal >= grandTotal) || isCard;
                });
                return status;
            }, [orders, cardPayments, getCalculatedShipping]);

            const updateInventory = (id, field, val) => {
                setInventory(prev => prev.map(item => {
                    if (item.id === id) {
                        const next = { ...item, [field]: val };
                        if (field === 'price' && val !== '') setProductHistory(h => ({ ...h, [item.name]: Number(val) }));
                        return next;
                    }
                    return item;
                }));
            };

            const addInventoryRow = (afterId = null) => {
                const newId = `inv_${Date.now()}`;
                const newItem = { id: newId, name: '', stock: 100, price: '' };
                setInventory(prev => {
                    if (!afterId) return [newItem, ...prev];
                    const idx = prev.findIndex(item => item.id === afterId);
                    const next = [...prev];
                    next.splice(idx + 1, 0, newItem);
                    return next;
                });
                setLastAddedId(newId);
            };

            const handleGenerateOptions = (e) => {
                e.preventDefault();
                if (!optBaseName.trim()) return openModal("기본 상품명을 입력해주세요.", 'alert');
                
                const base = optBaseName.trim();
                const o1 = opt1.split(',').map(s => s.trim()).filter(s => s);
                const o2 = opt2.split(',').map(s => s.trim()).filter(s => s);
                const price = Number(optPrice) || 0;

                let newItems = [];

                if (o1.length > 0 && o2.length > 0) {
                    for (const v1 of o1) {
                        for (const v2 of o2) {
                            newItems.push({ name: `${base} ${v1} ${v2}`.trim(), stock: 100, price });
                        }
                    }
                } else if (o1.length > 0) {
                    for (const v1 of o1) {
                        newItems.push({ name: `${base} ${v1}`.trim(), stock: 100, price });
                    }
                } else if (o2.length > 0) {
                    for (const v2 of o2) {
                        newItems.push({ name: `${base} ${v2}`.trim(), stock: 100, price });
                    }
                } else {
                     newItems.push({ name: base, stock: 100, price });
                }

                if (newItems.length > 0) {
                    setInventory(prev => {
                        const added = newItems.map(item => ({
                            id: `inv_${Date.now()}_${Math.random()}`,
                            name: item.name,
                            stock: item.stock,
                            price: item.price === 0 ? '' : item.price 
                        }));
                        return [...added, ...prev]; 
                    });
                    setIsOptionModalOpen(false);
                    setOptBaseName(''); setOpt1(''); setOpt2(''); setOptPrice('');
                }
            };
            
            const handleResetInventory = () => {
                openModal("재고/발주 목록을 모두 초기화하시겠습니까?\n(이 작업은 되돌릴 수 없습니다)", 'confirm', () => {
                    setInventory([]);
                    openModal("재고가 초기화되었습니다.", 'alert');
                });
            };

            useEffect(() => {
                if (lastAddedId) {
                    const input = document.getElementById(`inv-name-${lastAddedId}`);
                    if (input) { input.focus(); }
                    setLastAddedId(null);
                }
            }, [lastAddedId, inventory]);

            const stats = useMemo(() => {
                return (Array.isArray(inventory) ? inventory : []).map(info => {
                    let ordered = 0;
                    let paid = 0;
                    let unpaid = 0;
                    orders.filter(o => o.product === info.name && !o.isCancelled && info.name !== '').forEach(o => {
                        const q = Number(o.quantity) || 0;
                        ordered += q;
                        if (customerPaidStatus[o.customer]) paid += q;
                        else unpaid += q;
                    });
                    return { ...info, totalOrdered: ordered, paidOrdered: paid, unpaidOrdered: unpaid, remaining: Number(info.stock || 0) - ordered };
                }).filter(p => !searchTerm || p.name.toLowerCase().includes(searchTerm.toLowerCase()));
            }, [orders, inventory, searchTerm, customerPaidStatus]);

            const selectedProductDetails = useMemo(() => {
                if (!selectedProduct) return [];
                const relevantOrders = orders.filter(o => o.product === selectedProduct && !o.isCancelled);
                const detailGroups = {};
                relevantOrders.forEach(o => {
                    if(!detailGroups[o.customer]) detailGroups[o.customer] = 0;
                    detailGroups[o.customer] += Number(o.quantity);
                });

                return Object.entries(detailGroups).map(([nick, qty]) => {
                    const customerActiveItems = orders.filter(o => o.customer === nick && !o.isCancelled);
                    const isCard = cardPayments[nick];
                    const shipping = getCalculatedShipping(nick);
                    const productTotal = customerActiveItems.reduce((sum, i) => sum + Number(i.price), 0);
                    const grandTotal = productTotal + (customerActiveItems.length > 0 ? shipping : 0);
                    const depositTotal = orders.filter(o => o.customer === nick).reduce((sum, i) => sum + (i.deposit || 0), 0);
                    const balance = grandTotal - depositTotal;
                    const isPaid = balance <= 0 && grandTotal >= 0 && customerActiveItems.length > 0;

                    let statusText = "미입금";
                    let statusClasses = "bg-red-100 text-red-700 dark:bg-red-900/30 dark:text-red-400 border border-red-200 dark:border-red-800";
                    
                    if (isCard) {
                        statusText = "카드결제";
                        statusClasses = "bg-purple-100 text-purple-700 dark:bg-purple-900/30 dark:text-purple-400 border border-purple-200 dark:border-purple-800";
                    } else if (isPaid) {
                        statusText = "완납";
                        statusClasses = "bg-green-100 text-green-700 dark:bg-green-900/30 dark:text-green-400 border border-green-200 dark:border-green-800";
                    }

                    return { nick, qty, statusText, statusClasses, isPaid, isCard };
                }).sort((a, b) => {
                    const getPriority = (item) => {
                        if (item.isPaid && !item.isCard) return 1;
                        if (item.isCard) return 2;
                        return 3;
                    };
                    const pA = getPriority(a);
                    const pB = getPriority(b);
                    if (pA !== pB) return pA - pB;
                    return a.nick.localeCompare(b.nick);
                });

            }, [selectedProduct, orders, cardPayments, getCalculatedShipping]);

            const handleCopyBuyers = () => {
                if (!selectedProductDetails || selectedProductDetails.length === 0) return;
                const textToCopy = `[ ${selectedProduct} ] 📢 ` + selectedProductDetails.map(d => d.qty > 1 ? `${d.nick}(${d.qty})` : d.nick).join(' 🔹 ');
                
                const textArea = document.createElement("textarea");
                textArea.value = textToCopy;
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    openModal(`'${selectedProduct}' 구매자 ${selectedProductDetails.length}명의 명단이 유튜브 복사용으로 복사되었습니다.`, 'alert');
                } catch (err) {
                    openModal('복사 실패', 'alert');
                }
                document.body.removeChild(textArea);
            };

            return (
                <div className="flex flex-col h-full bg-white dark:bg-slate-800 p-4 shadow-sm border dark:border-slate-700 rounded-lg relative">
                    {isOptionModalOpen && (
                        <div className="absolute inset-0 bg-white/90 dark:bg-slate-900/90 z-20 flex items-center justify-center backdrop-blur-sm animate-pop p-4">
                            <div className="bg-white dark:bg-slate-800 border border-indigo-200 dark:border-indigo-800 shadow-2xl rounded-xl p-5 w-full max-w-md">
                                <div className="flex justify-between items-center mb-4 border-b dark:border-slate-700 pb-2">
                                    <h3 className="font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-2"><Icon name="squares-four" weight="fill"/> 옵션 상품 일괄 생성</h3>
                                    <button onClick={() => setIsOptionModalOpen(false)} className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-200"><Icon name="x" weight="bold"/></button>
                                </div>
                                <form onSubmit={handleGenerateOptions} className="space-y-3">
                                    <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">기본 상품명 (필수)</label><input type="text" value={optBaseName} onChange={e=>setOptBaseName(e.target.value)} placeholder="예: 01 밴딩 바지" className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none" autoFocus required/></div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">옵션 1: 색상 등 (쉼표로 구분)</label><input type="text" value={opt1} onChange={e=>setOpt1(e.target.value)} placeholder="예: 검정, 크림, 카키" className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none"/></div>
                                    <div>
                                        <label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">옵션 2: 사이즈 등 (쉼표로 구분)</label><input type="text" value={opt2} onChange={e=>setOpt2(e.target.value)} placeholder="예: S, M, L, XL" className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none mb-1.5"/>
                                        <div className="flex flex-wrap gap-1">
                                            <button type="button" onClick={() => setOpt2('XS, S, M, L, XL, XXL')} className="text-[10px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 px-1.5 py-0.5 rounded hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors">XS~XXL</button>
                                            <button type="button" onClick={() => setOpt2('44, 55, 66, 77, 88, 99')} className="text-[10px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 px-1.5 py-0.5 rounded hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors">44~99</button>
                                            <button type="button" onClick={() => setOpt2('225, 230, 235, 240, 245, 250, 255')} className="text-[10px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 px-1.5 py-0.5 rounded hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors">225~255</button>
                                            <button type="button" onClick={() => setOpt2('90, 95, 100, 105, 110, 115')} className="text-[10px] bg-indigo-50 dark:bg-indigo-900/30 text-indigo-600 dark:text-indigo-400 border border-indigo-200 dark:border-indigo-800 px-1.5 py-0.5 rounded hover:bg-indigo-100 dark:hover:bg-indigo-900/50 transition-colors">90~115</button>
                                        </div>
                                    </div>
                                    <div><label className="block text-[10px] font-bold text-gray-500 dark:text-slate-400 mb-1">일괄 등록 단가</label><input type="number" value={optPrice} onChange={e=>setOptPrice(e.target.value)} placeholder="숫자만 입력" className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-transparent dark:text-slate-100 focus:ring-2 focus:ring-indigo-500 outline-none"/></div>
                                    <div className="pt-3 flex gap-2"><button type="button" onClick={() => setIsOptionModalOpen(false)} className="flex-1 py-2 rounded font-bold text-sm bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300 hover:bg-gray-200 transition-colors">취소</button><button type="submit" className="flex-1 py-2 rounded font-bold text-sm bg-indigo-600 text-white hover:bg-indigo-700 transition-colors shadow-sm">일괄 생성</button></div>
                                    <div className="text-[10px] text-gray-400 text-center mt-2">💡 입력 예시 결과: 01 밴딩 바지 검정 S, 01 밴딩 바지 검정 M ...</div>
                                </form>
                            </div>
                        </div>
                    )}

                    <div className="flex justify-between items-center mb-4 pb-2 border-b dark:border-slate-700 dark:text-white">
                        <h2 className="text-xl font-bold flex items-center gap-2"><Icon name="clipboard-text" weight="fill" className="text-indigo-600 dark:text-indigo-400"/> 재고/발주 현황 <span className="text-sm font-normal text-gray-500 dark:text-slate-400">({stats.length}종)</span></h2>
                        <div className="flex gap-2">
                            <button onClick={handleResetInventory} className="bg-rose-500 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm transition-colors hover:bg-rose-600 flex items-center gap-1"><Icon name="trash" weight="fill"/> 초기화</button>
                            <button onClick={() => setIsOptionModalOpen(true)} className="bg-indigo-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm flex items-center gap-1 transition-colors hover:bg-indigo-700"><Icon name="squares-four" weight="bold"/> 옵션 일괄 생성</button>
                            <button onClick={() => addInventoryRow()} className="bg-white border border-indigo-200 dark:border-slate-600 dark:bg-slate-700 text-indigo-700 dark:text-slate-200 px-3 py-1.5 rounded text-sm font-bold shadow-sm transition-colors hover:bg-indigo-50 dark:hover:bg-slate-600">+ 단일 추가</button>
                            <button onClick={() => downloadExcel(stats, '발주현황')} className="bg-green-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-md transition-transform hover:scale-105 flex items-center gap-1"><Icon name="file-xls" weight="fill"/> 엑셀 다운로드</button>
                        </div>
                    </div>
                    <div className="relative mb-2">
                        <Icon name="magnifying-glass" className="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500"/>
                        <input type="text" placeholder="상품명 검색..." value={searchTerm} onChange={e => setSearchTerm(e.target.value)} className="w-full pl-10 p-2 border rounded text-sm dark:border-slate-600 dark:bg-transparent dark:text-white outline-none focus:ring-1 focus:ring-indigo-500" />
                    </div>
                    <div className="flex-1 overflow-y-auto border rounded dark:border-slate-700 bg-white dark:bg-slate-900">
                        <table className="w-full text-sm text-left">
                            <thead className="bg-gray-100 dark:bg-slate-700 dark:text-white sticky top-0 z-10">
                                <tr>
                                    <th className="p-2 border-b dark:border-slate-600 w-[25%]">상품명</th>
                                    <th className="p-2 border-b dark:border-slate-600 text-right w-[15%]">단가</th>
                                    <th className="p-2 border-b dark:border-slate-600 text-center w-[10%]">주문</th>
                                    <th className="p-2 border-b dark:border-slate-600 text-center w-[10%] text-green-600 dark:text-green-400">입금</th>
                                    <th className="p-2 border-b dark:border-slate-600 text-center w-[10%] text-red-500 dark:text-red-400">미입금</th>
                                    <th className="p-2 border-b dark:border-slate-600 text-center w-[10%]">총재고</th>
                                    <th className="p-2 border-b dark:border-slate-600 text-center w-[10%]">잔여</th>
                                    <th className="p-2 border-b dark:border-slate-600 w-10 text-center">삭제</th>
                                </tr>
                            </thead>
                            <tbody className="divide-y dark:divide-slate-700 dark:text-slate-200">
                                {stats.map((p, idx) => (
                                    <tr key={p.id} onClick={() => setSelectedProduct(selectedProduct === p.name ? null : p.name)} className={`hover:bg-indigo-50 dark:hover:bg-slate-800/50 cursor-pointer transition-colors group ${selectedProduct === p.name ? 'bg-indigo-50 dark:bg-slate-800/80 ring-1 ring-indigo-300 dark:ring-indigo-600' : ''}`}>
                                        <td className="p-1"><input id={`inv-name-${p.id}`} type="text" value={p.name} onClick={(e) => e.stopPropagation()} onChange={(e) => updateInventory(p.id, 'name', e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById(`inv-price-${p.id}`).focus(); } }} className="w-full bg-transparent px-2 py-1 outline-none focus:bg-white dark:focus:bg-slate-900 focus:ring-1 ring-indigo-200 dark:ring-indigo-800 rounded font-bold text-gray-700 dark:text-slate-200" /></td>
                                        <td className="p-1 text-right"><input id={`inv-price-${p.id}`} type="text" value={p.price === '' || p.price === 0 ? '' : Number(p.price).toLocaleString()} onClick={(e) => e.stopPropagation()} onChange={(e) => { const val = e.target.value.replace(/,/g, ''); if (!isNaN(val)) updateInventory(p.id, 'price', val); }} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); document.getElementById(`inv-stock-${p.id}`).focus(); } }} className="w-full bg-transparent text-right py-1 outline-none font-bold focus:bg-white dark:focus:bg-slate-900 focus:ring-1 ring-indigo-200 dark:ring-indigo-800 rounded text-gray-700 dark:text-slate-200" /></td>
                                        <td className="p-1 text-center text-indigo-600 dark:text-indigo-400 font-bold bg-gray-50/50 dark:bg-slate-900/30">{p.totalOrdered}</td>
                                        <td className="p-1 text-center text-green-600 dark:text-green-400 font-bold">{p.paidOrdered}</td>
                                        <td className="p-1 text-center text-red-500 dark:text-red-400 font-bold">{p.unpaidOrdered}</td>
                                        <td className="p-1 text-center"><input id={`inv-stock-${p.id}`} type="number" value={p.stock === 0 ? '' : p.stock} onClick={(e) => e.stopPropagation()} onChange={(e) => updateInventory(p.id, 'stock', e.target.value)} onKeyDown={(e) => { if (e.key === 'Enter') { e.preventDefault(); if (idx + 1 < stats.length) { document.getElementById(`inv-name-${stats[idx+1].id}`).focus(); } else { addInventoryRow(p.id); } } }} className="w-full bg-transparent text-center py-1 outline-none font-bold focus:bg-white dark:focus:bg-slate-900 focus:ring-1 ring-indigo-200 dark:ring-indigo-800 rounded text-gray-700 dark:text-slate-200" /></td>
                                        <td className={`p-1 text-center font-bold ${p.remaining <= 0 ? 'text-red-500 dark:text-red-400' : 'text-blue-600 dark:text-blue-400'} bg-gray-50/50 dark:bg-slate-900/30`}>{p.remaining}</td>
                                        <td className="p-1 text-center"><button onClick={(e) => { e.stopPropagation(); setInventory(prev => prev.filter(i => i.id !== p.id)); }} className="text-gray-300 dark:text-slate-600 hover:text-red-500 transition-colors"><Icon name="trash" weight="bold"/></button></td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                        {stats.length === 0 && <div className="p-10 text-center text-gray-400">데이터가 없습니다. 상품을 추가해주세요.</div>}
                    </div>

                    {selectedProduct && (
                        <div className="h-[35%] mt-2 border dark:border-slate-700 rounded-lg bg-gray-50 dark:bg-slate-900 flex flex-col overflow-hidden shadow-inner">
                            <div className="p-2 border-b dark:border-slate-700 flex justify-between items-center bg-white dark:bg-slate-800">
                                <h3 className="font-bold text-sm text-indigo-700 dark:text-indigo-400 flex items-center gap-1">
                                    <Icon name="users" weight="fill" /> '{selectedProduct}' 주문 고객 목록 <span className="text-xs text-gray-500 font-normal">({selectedProductDetails.length}명)</span>
                                </h3>
                                <div className="flex items-center gap-3">
                                    <button onClick={handleCopyBuyers} className="flex items-center gap-1 bg-indigo-50 hover:bg-indigo-100 dark:bg-indigo-900/30 dark:hover:bg-indigo-900/50 text-indigo-600 dark:text-indigo-300 px-2 py-0.5 rounded text-xs font-bold transition-colors border border-indigo-200 dark:border-indigo-800 shadow-sm">
                                        <Icon name="copy" weight="bold" /> 닉네임만 복사
                                    </button>
                                    <button onClick={() => setSelectedProduct(null)} className="text-gray-400 hover:text-gray-600 dark:hover:text-slate-200"><Icon name="x" weight="bold" /></button>
                                </div>
                            </div>
                            <div className="flex-1 overflow-y-auto p-2">
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-2">
                                    {selectedProductDetails.map((d, i) => (
                                        <div key={i} className="bg-white dark:bg-slate-800 border border-gray-200 dark:border-slate-600 rounded p-2 flex justify-between items-center shadow-sm hover:shadow-md transition-shadow">
                                            <div className="flex items-center gap-2">
                                                <span className="font-bold text-sm text-gray-800 dark:text-slate-100 truncate max-w-[80px]" title={d.nick}>{d.nick}</span>
                                                <span className="text-xs text-indigo-600 dark:text-indigo-400 font-bold">{d.qty}개</span>
                                            </div>
                                            <span className={`text-[10px] font-bold px-1.5 py-0.5 rounded ${d.statusClasses}`}>{d.statusText}</span>
                                        </div>
                                    ))}
                                    {selectedProductDetails.length === 0 && <div className="col-span-full text-center text-xs text-gray-500 py-4">해당 상품을 주문한 고객이 아직 없습니다.</div>}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const CustomerTab = ({ addresses, setAddresses, googleScriptUrl, customerSheetId, openModal, specialCustomers, setSpecialCustomers, orders, addressMapping }) => {
            const [searchTerm, setSearchTerm] = useState('');
            const fileInputRef = useRef(null);
            const [inputData, setInputData] = useState({ nickname: '', realname: '', phone: '', zipcode: '', address: '', memo: '' });
            const [inlineEditNick, setInlineEditNick] = useState(null);
            const [inlineEditData, setInlineEditData] = useState({});
            const [scInput, setScInput] = useState({ nickname: '', type: 'vip', memo: '' });
            const [scSearch, setScSearch] = useState('');
            const [selectedAddresses, setSelectedAddresses] = useState(new Set());

            const filteredAddresses = useMemo(() => {
                let result = !searchTerm ? [...addresses] : addresses.filter(a => a.nickname.toLowerCase().includes(searchTerm.toLowerCase()) || a.realname.toLowerCase().includes(searchTerm.toLowerCase()));
                const nicknameCounts = {}; addresses.forEach(a => { const nick = normalizeString(a.nickname); nicknameCounts[nick] = (nicknameCounts[nick] || 0) + 1; });
                result.sort((a, b) => {
                    const countA = nicknameCounts[normalizeString(a.nickname)] || 0;
                    const countB = nicknameCounts[normalizeString(b.nickname)] || 0;
                    if ((countA > 1 && countB > 1) || (countA <= 1 && countB <= 1)) return a.nickname.localeCompare(b.nickname);
                    return countA > 1 ? -1 : 1;
                });
                return result;
            }, [addresses, searchTerm]);

            const nicknameCountsFull = useMemo(() => { const counts = {}; addresses.forEach(a => { const nick = normalizeString(a.nickname); counts[nick] = (counts[nick] || 0) + 1; }); return counts; }, [addresses]);

            const handleAdd = () => { 
                if (!inputData.nickname) return openModal("닉네임 필수", 'alert'); 
                setAddresses(prev => {
                    const isDuplicate = prev.some(a => a.nickname === inputData.nickname && a.phone === inputData.phone);
                    if (isDuplicate) { openModal("이미 동일한 닉네임과 연락처로 등록된 정보가 있습니다.", 'alert'); return prev; }
                    return [...prev, inputData]; 
                }); 
                setInputData({ nickname: '', realname: '', phone: '', zipcode: '', address: '', memo: '' }); 
            };

            const handleDelete = (nickname, phone) => { openModal(`'${nickname}'님의 주소 정보를 삭제하시겠습니까?`, 'confirm', () => { setAddresses(prev => prev.filter(a => !(a.nickname === nickname && a.phone === phone))); }); };

            const handleAddressSearch = (setter) => { try { new window.daum.Postcode({ oncomplete: function(data) { let fullAddr = data.address; let extraAddr = ''; if(data.addressType === 'R'){ if(data.bname !== '') extraAddr += data.bname; if(data.buildingName !== '') extraAddr += (extraAddr !== '' ? ', ' + data.buildingName : data.buildingName); if(extraAddr !== '') fullAddr += ' (' + extraAddr + ')'; } setter(prev => ({ ...prev, zipcode: data.zonecode, address: fullAddr })); } }).open(); } catch (e) { openModal("주소 검색 오류", 'alert'); } };
            const startInlineEdit = (addr) => { setInlineEditNick(addr.nickname); setInlineEditData({...addr}); };
            const saveInlineEdit = () => { setAddresses(prev => prev.map(a => (a.nickname === inlineEditNick && a.phone === inlineEditData.phone) ? inlineEditData : a)); setInlineEditNick(null); };
            const handleAddSpecial = () => { if (!scInput.nickname) return openModal("닉네임을 입력해주세요.", 'alert'); setSpecialCustomers(prev => ({ ...prev, [scInput.nickname]: { type: scInput.type, memo: scInput.memo } })); setScInput({ nickname: '', type: 'vip', memo: '' }); };
            const handleDeleteSpecial = (nick) => { openModal(`'${nick}'님의 VIP/진상 설정을 삭제하시겠습니까?`, 'confirm', () => { setSpecialCustomers(prev => { const next = { ...prev }; delete next[nick]; return next; }); }); };
            
            const handleCloudSave = async () => { 
                openModal("현재 화면의 주소를 구글 시트 맨 아래에 '누적 추가' 하시겠습니까?\n(기존 데이터는 절대 지워지지 않고 아래에 안전하게 쌓입니다.)", 'confirm', async () => { 
                    if (!googleScriptUrl) return; 
                    const actualSheetId = getCleanSheetId(customerSheetId);
                    await fetch(googleScriptUrl, { method: 'POST', body: JSON.stringify({ action: 'append_address', data: addresses, sheet_id: actualSheetId }), mode: 'no-cors', headers: {'Content-Type': 'text/plain;charset=utf-8'} }); 
                    openModal("시트 하단에 누적 저장이 완료되었습니다!", 'alert'); 
                }); 
            };
            
            const handleCloudLoad = async () => { openModal("클라우드에서 불러오시겠습니까?\n(기존 주소록에 병합됩니다)", 'confirm', async () => { if (!googleScriptUrl) return; const actualSheetId = getCleanSheetId(customerSheetId); const res = await fetch(`${googleScriptUrl}?action=get_addresses&t=${Date.now()}&sheet_id=${actualSheetId}`); const data = await res.json(); if(data.error) { openModal(`로드 실패: ${data.error}`, 'alert'); return; } if(data && data.addresses) { setAddresses(prev => { const newAddrs = [...prev]; data.addresses.forEach(d => { if(!newAddrs.some(a => a.nickname === d.nickname && a.phone === d.phone)) newAddrs.push(d); }); return newAddrs; }); openModal("로드 완료", 'alert'); } }); };
            
            const handleResetAddresses = () => { openModal("주소록을 모두 초기화하시겠습니까?\n(이 작업은 되돌릴 수 없습니다)", 'confirm', () => { setAddresses([]); openModal("주소록이 초기화되었습니다.", 'alert'); }); };

            const handleExtractMatchedAddresses = () => {
                if (orders.length === 0) return openModal("현재 주문서에 고객이 없습니다.", 'alert');
                openModal("현재 주문서에 매칭된 주소만 추출하여\n주소록을 재정리하시겠습니까?\n\n(수동 매칭건도 현재 닉네임으로 통합되며, 미매칭 주소는 모두 삭제됩니다.)", 'confirm', () => {
                    const uniqueCustomers = [...new Set(orders.map(o => o.customer))];
                    const newAddresses = [];
                    const addedNicks = new Set();
                    uniqueCustomers.forEach(nick => {
                        const targetNick = addressMapping[nick] || nick;
                        const match = addresses.find(a => normalizeString(a.nickname) === normalizeString(targetNick));
                        if (match && !addedNicks.has(nick)) { newAddresses.push({ ...match, nickname: nick }); addedNicks.add(nick); }
                    });
                    if (newAddresses.length > 0) { setAddresses(newAddresses); openModal(`총 ${newAddresses.length}명의 매칭된 주소로 정리되었습니다!\n'저장' 버튼을 눌러 덮어씌워주세요.`, 'alert'); } else { openModal("매칭된 주소가 없습니다.", 'alert'); }
                });
            };

            const toggleSelectAddress = (nick, phone) => { const key = `${nick}_${phone}`; setSelectedAddresses(prev => { const next = new Set(prev); if (next.has(key)) next.delete(key); else next.add(key); return next; }); };
            const toggleSelectAll = (e) => { if (e.target.checked) setSelectedAddresses(new Set(filteredAddresses.map(a => `${a.nickname}_${a.phone}`))); else setSelectedAddresses(new Set()); };
            const handleDeleteSelected = () => { if (selectedAddresses.size === 0) return; openModal(`선택한 ${selectedAddresses.size}명의 주소 정보를 삭제하시겠습니까?`, 'confirm', () => { setAddresses(prev => prev.filter(a => !selectedAddresses.has(`${a.nickname}_${a.phone}`))); setSelectedAddresses(new Set()); openModal("삭제 완료", 'alert'); }); };
            
            const handleExcelUpload = (e) => { 
                const file = e.target.files[0]; 
                if (!file) return; 
                const reader = new FileReader(); 
                reader.onload = (evt) => { 
                    const wb = XLSX.read(evt.target.result, { type: 'binary' }); 
                    const ws = wb.Sheets[wb.SheetNames[0]]; 
                    const data = XLSX.utils.sheet_to_json(ws, { header: 1 }); 
                    const newAddrs = []; 
                    for(let i=1; i<data.length; i++) { 
                        const row = data[i];
                        if(row && row[3]) { newAddrs.push({ nickname: String(row[3] || '').trim(), realname: String(row[5] || '').trim(), phone: String(row[6] || '').trim(), zipcode: '', address: String(row[7] || '').trim(), memo: String(row[8] || '').trim() }); } 
                    } 
                    setAddresses(prev => {
                        const existingSet = new Set(prev.map(c => `${c.nickname}|${c.realname}|${c.phone}|${c.address}`));
                        const combined = [...prev];
                        let addedCount = 0;
                        newAddrs.forEach(n => { const key = `${n.nickname}|${n.realname}|${n.phone}|${n.address}`; if (!existingSet.has(key)) { existingSet.add(key); combined.push(n); addedCount++; } });
                        setTimeout(() => { openModal(`엑셀 업로드 완료!\n\n총 ${newAddrs.length}건 중 모든 정보가 완전히 동일한 중복 데이터를 쏙 빼고,\n새로운 ${addedCount}건만 추가되었습니다.`, 'alert'); }, 10);
                        return combined;
                    });
                }; 
                reader.readAsBinaryString(file); 
                e.target.value = ''; 
            };

             return (
                 <div className="flex h-full gap-4">
                     <div className="flex-1 flex flex-col bg-white dark:bg-slate-800 rounded-lg shadow-sm border dark:border-slate-700 p-4 overflow-hidden">
                         <div className="flex justify-between items-center mb-4 pb-4 border-b dark:border-slate-700">
                            <h2 className="text-xl font-bold flex items-center gap-2 dark:text-slate-100"><Icon name="address-book" weight="fill" className="text-indigo-600 dark:text-indigo-400"/> 배송 주소록 <span className="text-sm font-normal text-gray-500 dark:text-slate-400">({addresses.length}명)</span></h2>
                            <div className="flex gap-2">
                                <button onClick={handleExtractMatchedAddresses} className="bg-indigo-500 hover:bg-indigo-600 text-white px-2 py-1 rounded text-xs font-bold transition-colors flex items-center gap-1 shadow-sm"><Icon name="funnel" weight="fill"/> 매칭 주소만 남기기</button>
                                <button onClick={handleDeleteSelected} disabled={selectedAddresses.size === 0} className={`px-2 py-1 rounded text-xs font-bold transition-colors flex items-center gap-1 ${selectedAddresses.size > 0 ? 'bg-red-500 hover:bg-red-600 text-white shadow-sm' : 'bg-gray-200 dark:bg-slate-700 text-gray-400 dark:text-slate-500 cursor-not-allowed'}`}><Icon name="trash" weight="fill"/> 선택 삭제</button>
                                <button onClick={handleResetAddresses} className="bg-rose-500 text-white px-2 py-1 rounded text-xs font-bold transition-colors hover:bg-rose-600 flex items-center gap-1 shadow-sm"><Icon name="trash" weight="fill"/> 초기화</button>
                                <button onClick={handleCloudSave} className="bg-orange-500 text-white px-2 py-1 rounded text-xs font-bold transition-colors hover:bg-orange-600 shadow-sm flex items-center gap-1"><Icon name="stack-plus" weight="bold"/> 시트에 누적 추가</button>
                                <button onClick={handleCloudLoad} className="bg-blue-500 text-white px-2 py-1 rounded text-xs font-bold transition-colors hover:bg-blue-600 shadow-sm flex items-center gap-1"><Icon name="download-simple" weight="bold"/> 로드</button>
                                <input type="file" ref={fileInputRef} onChange={handleExcelUpload} className="hidden" />
                                <button onClick={()=>fileInputRef.current.click()} className="bg-green-600 text-white px-3 py-1.5 rounded text-sm font-bold shadow-sm transition-colors hover:bg-green-700">엑셀 업로드</button>
                            </div>
                        </div>
                         <div className="bg-indigo-50 dark:bg-slate-700/50 p-2 rounded-lg border border-indigo-100 dark:border-slate-600 mb-2 grid grid-cols-6 gap-2 items-end">
                            <div className="col-span-1"><input type="text" value={inputData.nickname} onChange={e=>setInputData({...inputData, nickname:e.target.value})} className="w-full border dark:border-slate-600 rounded px-1 py-1 text-xs bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none" placeholder="닉네임"/></div>
                            <div className="col-span-1"><input type="text" value={inputData.realname} onChange={e=>setInputData({...inputData, realname:e.target.value})} className="w-full border dark:border-slate-600 rounded px-1 py-1 text-xs bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none" placeholder="이름"/></div>
                            <div className="col-span-1"><input type="text" value={inputData.phone} onChange={e=>setInputData({...inputData, phone:e.target.value})} className="w-full border dark:border-slate-600 rounded px-1 py-1 text-xs bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none" placeholder="연락처"/></div>
                            <div className="col-span-2 flex gap-1"><input type="text" value={inputData.address} onChange={e=>setInputData({...inputData, address:e.target.value})} className="flex-1 border dark:border-slate-600 rounded px-1 py-1 text-xs bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none" placeholder="주소"/><button onClick={()=>handleAddressSearch(setInputData)} className="bg-slate-500 hover:bg-slate-600 text-white px-2 rounded text-[10px] transition-colors shadow-sm">검색</button></div>
                            <button onClick={handleAdd} className="bg-indigo-600 hover:bg-indigo-700 text-white px-2 py-1 rounded font-bold text-xs shadow-sm transition-colors">추가</button>
                         </div>
                         <div className="flex justify-between items-center mb-2">
                            <div className="relative flex-1 mr-2"><Icon name="magnifying-glass" className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-400 text-xs"/><input type="text" placeholder="닉네임/이름 검색..." value={searchTerm} onChange={e=>setSearchTerm(e.target.value)} className="w-full pl-7 border dark:border-slate-600 rounded px-2 py-1.5 text-xs outline-none bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400" /></div>
                            <span className="text-[10px] text-gray-400 dark:text-slate-400 bg-gray-100 dark:bg-slate-700 px-2 py-1 rounded border dark:border-slate-600 shadow-sm flex items-center gap-1"><Icon name="lightbulb" weight="fill" className="text-yellow-500"/> 중복 닉네임 자동 상단 정렬</span>
                         </div>
                         <div className="flex-1 overflow-y-auto border dark:border-slate-700 rounded bg-white dark:bg-slate-900">
                            <table className="w-full text-xs text-left">
                                <thead className="bg-gray-100 dark:bg-slate-700 text-gray-600 dark:text-slate-300 sticky top-0 z-10">
                                    <tr>
                                        <th className="p-2 border-b dark:border-slate-600 w-10 text-center"><input type="checkbox" onChange={toggleSelectAll} checked={filteredAddresses.length > 0 && selectedAddresses.size === filteredAddresses.length} className="cursor-pointer w-3.5 h-3.5 accent-indigo-600" /></th>
                                        <th className="p-2 border-b dark:border-slate-600 w-28">닉네임</th>
                                        <th className="p-2 border-b dark:border-slate-600 w-16">이름</th>
                                        <th className="p-2 border-b dark:border-slate-600 w-24">연락처</th>
                                        <th className="p-2 border-b dark:border-slate-600">주소</th>
                                        <th className="p-2 border-b dark:border-slate-600 w-10 text-center">관리</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y dark:divide-slate-700">
                                    {filteredAddresses.map((addr, i) => {
                                        const isDuplicateNick = nicknameCountsFull[normalizeString(addr.nickname)] > 1;
                                        const isSelected = selectedAddresses.has(`${addr.nickname}_${addr.phone}`);
                                        return (
                                            <tr key={`${addr.nickname}-${addr.phone}-${i}`} className={`hover:bg-indigo-50/50 dark:hover:bg-slate-800 transition-colors cursor-pointer ${isDuplicateNick ? 'bg-orange-50/30 dark:bg-orange-900/10' : ''} ${isSelected ? 'bg-indigo-50 dark:bg-indigo-900/20' : ''}`} onDoubleClick={()=>startInlineEdit(addr)} onClick={(e) => { if(e.target.tagName !== 'INPUT' && e.target.tagName !== 'BUTTON' && e.target.tagName !== 'svg' && e.target.tagName !== 'line' && e.target.tagName !== 'polyline' && e.target.tagName !== 'path') toggleSelectAddress(addr.nickname, addr.phone); }}>
                                                {inlineEditNick===addr.nickname && inlineEditData.phone === addr.phone ?(
                                                    <td className="p-2" colSpan="6">
                                                        <div className="flex gap-1 items-center">
                                                            <span className="w-10 text-center">-</span>
                                                            <input value={inlineEditData.nickname} onChange={e=>setInlineEditData({...inlineEditData, nickname:e.target.value})} className="w-24 border dark:border-slate-600 rounded px-1 py-0.5 bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none" autoFocus/>
                                                            <input value={inlineEditData.realname} onChange={e=>setInlineEditData({...inlineEditData, realname:e.target.value})} className="w-16 border dark:border-slate-600 rounded px-1 py-0.5 bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none"/>
                                                            <input value={inlineEditData.phone} onChange={e=>setInlineEditData({...inlineEditData, phone:e.target.value})} className="w-24 border dark:border-slate-600 rounded px-1 py-0.5 bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none"/>
                                                            <input value={inlineEditData.address} onChange={e=>setInlineEditData({...inlineEditData, address:e.target.value})} className="flex-1 border dark:border-slate-600 rounded px-1 py-0.5 bg-transparent dark:text-slate-100 focus:ring-1 focus:ring-indigo-400 outline-none" onKeyDown={(e)=>e.key==='Enter' && saveInlineEdit()}/>
                                                            <button onClick={saveInlineEdit} className="text-white bg-blue-500 hover:bg-blue-600 px-2 py-0.5 rounded transition-colors shadow-sm"><Icon name="check" weight="bold"/></button>
                                                        </div>
                                                    </td>
                                                ):(
                                                    <>
                                                        <td className="p-2 text-center" onClick={(e)=>e.stopPropagation()}><input type="checkbox" checked={isSelected} onChange={()=>toggleSelectAddress(addr.nickname, addr.phone)} className="cursor-pointer w-3.5 h-3.5 accent-indigo-600" /></td>
                                                        <td className="p-2 font-bold text-indigo-700 dark:text-indigo-400 flex items-center gap-1">{addr.nickname}{isDuplicateNick && <span className="text-[9px] bg-orange-500 text-white px-1 rounded font-normal leading-tight shadow-sm">중복</span>}</td>
                                                        <td className="p-2 dark:text-slate-300">{addr.realname}</td>
                                                        <td className="p-2 dark:text-slate-300">{addr.phone}</td>
                                                        <td className="p-2 text-gray-600 dark:text-slate-400 truncate max-w-xs">{addr.address}</td>
                                                        <td className="p-2 text-center" onClick={(e)=>e.stopPropagation()}><button onClick={()=>handleDelete(addr.nickname, addr.phone)} className="text-gray-400 dark:text-slate-500 hover:text-red-500 transition-colors p-1"><Icon name="trash" weight="fill"/></button></td>
                                                    </>
                                                )}
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                     </div>
                     <div className="w-[30%] flex flex-col bg-white dark:bg-slate-800 rounded-lg shadow-sm border dark:border-slate-700 p-4 overflow-hidden border-l-4 border-l-orange-200 dark:border-l-orange-900/50">
                         <h2 className="text-lg font-bold mb-4 text-orange-800 dark:text-orange-400 flex items-center gap-2"><Icon name="crown" weight="fill" className="text-yellow-500"/> VIP / 진상 관리</h2>
                         <div className="bg-orange-50 dark:bg-orange-900/10 p-3 rounded-lg border border-orange-100 dark:border-orange-900/30 mb-4 flex flex-col gap-2">
                            <div className="flex gap-2">
                                <input type="text" placeholder="닉네임" value={scInput.nickname} onChange={e=>setScInput({...scInput, nickname: e.target.value})} className="flex-1 border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-800 dark:text-slate-100 focus:ring-1 focus:ring-orange-400 outline-none" />
                                <select value={scInput.type} onChange={e=>setScInput({...scInput, type: e.target.value})} className="border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-800 dark:text-slate-100 focus:ring-1 focus:ring-orange-400 outline-none"><option value="vip">👑 VIP</option><option value="black">🚫 진상</option><option value="manager">🛡️ 관리자</option></select>
                            </div>
                            <input type="text" placeholder="메모" value={scInput.memo} onChange={e=>setScInput({...scInput, memo: e.target.value})} className="w-full border dark:border-slate-600 rounded px-2 py-1.5 text-sm bg-white dark:bg-slate-800 dark:text-slate-100 focus:ring-1 focus:ring-orange-400 outline-none" onKeyDown={(e)=>e.key==='Enter' && handleAddSpecial()}/>
                            <button onClick={handleAddSpecial} className="w-full bg-orange-600 hover:bg-orange-700 text-white py-1.5 rounded font-bold text-sm shadow-sm transition-colors mt-1">등록하기</button>
                         </div>
                         <div className="relative mb-2">
                            <Icon name="magnifying-glass" className="absolute left-2 top-1/2 -translate-y-1/2 text-gray-400 dark:text-slate-500 text-xs"/>
                            <input type="text" placeholder="검색..." value={scSearch} onChange={e=>setScSearch(e.target.value)} className="w-full pl-7 border dark:border-slate-600 rounded px-2 py-1.5 text-sm outline-none bg-transparent dark:text-slate-100 focus:border-orange-400" />
                         </div>
                         <div className="flex-1 overflow-y-auto border dark:border-slate-700 rounded bg-white dark:bg-slate-900">
                            <ul className="divide-y dark:divide-slate-700">

                    const grandTotal = productTotal + (activeItems.length > 0 ? shipping : 0);

                });

                    const isPaid = (depositTotal >= grandTotal) || isCard;
                    return { nick, items: activeItems, isPaid, isCard, depositTotal, grandTotal };
                });

                entries.sort((a, b) => { const pA = getStatusPriority(a); const pB = getStatusPriority(b); if (pA !== pB) return pA - pB; return a.nick.localeCompare(b.nick); });

                    excelRows.push(createRow(`[ ${nick} ]`)); items.forEach(item => { const qtyPart = item.quantity > 1 ? ` ★${item.quantity}개` : ''; excelRows.push(createRow(`${item.product}${qtyPart}`)); }); 
                }); 
                downloadExcel(excelRows, '고객별_정산_배송리스트');

            const handleExportUnpaid = () => {
